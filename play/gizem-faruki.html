<script>window.SHEET = {"id": "gizem-faruki", "name": "Gizem Faruki", "player": "", "portrait": "../cabal/img/gizem-faruki.webp", "defaultEdition": "2014", "level": 7, "classes": [{"name": "Monk", "subclass": "Open Hand", "level": 7}], "race": "Human", "abilities": {"str": 11, "dex": 17, "con": 15, "int": 12, "wis": 16, "cha": 10}, "saveProf": ["str", "dex"], "proficiencyBonus": 3, "initiative": 6, "skills": {"arcana": 1, "athletics": 1, "history": 1, "investigation": 1, "religion": 1}, "ac": 16, "speed": 45, "hp": {"max": 52, "current": 52, "temp": 0}, "hitDice": [{"size": "d8", "total": 7}], "attacks": [{"name": "Crossbow, Light", "ability": "dex", "damage": "1d8+3", "damageType": "piercing", "range": "80/320 ft", "notes": "Simple, Ammunition, Loading, Two-Handed, Slow."}, {"name": "Unarmed Strike", "ability": "dex", "damage": "1d6+3", "damageType": "bludgeoning", "range": "melee", "notes": "Martial Arts die d6 (2014).", "ed": "2014"}, {"name": "Unarmed Strike", "ability": "dex", "damage": "1d8+3", "damageType": "bludgeoning", "range": "melee", "notes": "Martial Arts die d8 (2024). Empowered Strikes: may deal Force.", "ed": "2024"}, {"name": "Shortsword", "ability": "dex", "damage": "1d6+3", "damageType": "piercing", "range": "melee", "notes": "Martial, Finesse, Light, Vex. Monk weapon (d6).", "ed": "2014"}, {"name": "Shortsword", "ability": "dex", "damage": "1d8+3", "damageType": "piercing", "range": "melee", "notes": "Martial, Finesse, Light, Vex. Monk weapon (d8).", "ed": "2024"}], "features": [{"name": "Unarmored Defense", "source": "Class Features", "text": "Beginning at 1st level, while you are wearing no armor and not wielding a shield, your AC equals 10 + your Dexterity modifier + your Wisdom modifier."}, {"name": "Unarmored Movement", "source": "Class Features", "text": "Starting at 2nd level, your speed increases by 10 feet while you are not wearing armor or wielding a shield. This bonus increases when you reach certain monk levels, as shown in the Monk table. At 9th level, you gain the ability to move along vertical surfaces and across liquids on your turn without falling during the move."}, {"name": "Slow Fall", "source": "Class Features", "text": "Beginning at 4th level, you can use your reaction when you fall to reduce any falling damage you take by an amount equal to five times your monk level."}, {"name": "Extra Attack", "source": "Class Features", "text": "Beginning at 5th level, you can attack twice, instead of once, whenever you take the Attack action on your turn."}, {"name": "Martial Arts", "source": "Class Features", "text": "At 1st level, your practice of martial arts gives you mastery of combat styles that use unarmed strikes and monk weapons, which are shortswords and any simple melee weapons that don't have the two-handed or heavy property.\n\nYou gain the following benefits while you are unarmed or wielding only monk weapons and you aren't wearing armor or wielding a shield:\n\n• You can use Dexterity instead of Strength for the attack and damage rolls of your unarmed strikes and monk weapons. • You can roll a d4 in place of the normal damage of your unarmed strike or monk weapon. This die changes as you gain monk levels, as shown in the Martial Arts column of the Monk table. • When you use the Attack action with an unarmed strike or a monk weapon on your turn, you can make one unarmed strike as a bonus action. For example, if you take the Attack action and attack with a quarterstaff, you can also make an unarmed strike as a bonus action, assuming you haven't already taken a bonus action this turn.\n\nCertain monasteries use specialized forms of the monk weapons. For example, you might use a club that is two lengths of wood connected by a short chain (called a nunchaku) or a sickle with a shorter, straighter blade (called a kama). Whatever name you use for a monk weapon, you can use the game statistics provided for the weapon.", "ed": "2014"}, {"name": "Martial Arts", "source": "Class Features", "text": "You gain the following benefits while unarmed or wielding only Monk weapons, provided you aren't wearing armor or wielding a Shield.\n• You can make an Unarmed Strike as a Bonus Action.\n• You can roll 1d8 in place of the normal damage from your Unarmed Strikes or Monk weapons.\n• You can use Dex. instead of Str. for the attack and damage rolls of your Unarmed Strikes and Monk Weapons. In addition, when you use the Grapple or Shove option of your Unarmed Strike, you can use Dex. instead of Str. to determine the save DC.", "ed": "2024"}, {"name": "Ki", "source": "Class Features", "text": "Starting at 2nd level, your training allows you to harness the mystic energy of ki. Your access to this energy is represented by a number of ki points. Your monk level determines the number of points you have, as shown in the Ki Points column of the Monk table. You can spend these points to fuel various ki features. You start knowing three such features: Flurry of Blows, Patient Defense, and Step of the Wind. You learn more ki features as you gain levels in this class. When you spend a ki point, it is unavailable until you finish a short or long rest, at the end of which you draw all of your expended ki back into yourself. You must spend at least 30 minutes of the rest meditating to regain your ki points. Some of your ki features require your target to make a saving throw to resist the feature's effects. The saving throw DC is calculated as follows:\n\nKi save DC = 8 + your proficiency bonus + your Wisdom modifier\n\nFlurry of Blows: Immediately after you take the Attack action on your turn, you can spend 1 ki point to make two unarmed strikes as a bonus action.\n\nPatient Defense: You can spend 1 ki point to take the Dodge action as a bonus action on your turn.\n\nStep of the Wind: You can spend 1 ki point to take the Disengage or Dash action as a bonus action on your turn, and your jump distance is doubled for the turn.", "ed": "2014", "uses": {"max": 7, "per": "Short Rest"}}, {"name": "Monk's Focus", "source": "Class Features", "text": "Your focus and martial training allows you to harness a well of energy within yourself called Focus Points. You have 7 Focus Points and regain all expended points after you finish a Short or Long Rest.\nYou can expend these points to enhance or fuel certain Monk features. You start knowing three such features:\nFlurry of Blows. You can expend 1 Focus Point to make two Unarmed Strikes as a Bonus Action.\nPatient Defense. You can take the Disengage action as a Bonus Action or expend 1 Focus Point to take both the Disengage and Dodge actions as a Bonus Action.\nStep of the Wind. You can take the Dash action as a Bonus Action or expend 1 Focus Point to take both the Disengage and Dash actions as a Bonus Action, and your jump distance is doubled for the turn.\nFeatures that use Focus Points may require your target to make a saving throw. The save DC equals 8 + Wis. modifier + Prof. Bonus.", "ed": "2024", "uses": {"max": 7, "per": "Short Rest"}}, {"name": "Deflect Missiles", "source": "Class Features", "text": "Starting at 3rd level, you can use your reaction to deflect or catch the missile when you are hit by a ranged weapon attack. When you do so, the damage you take from the attack is reduced by 1d10 + your Dexterity modifier + your monk level. If you reduce the damage to 0, you can catch the missile if it is small enough for you to hold in one hand and you have at least one hand free. If you catch a missile in this way, you can spend 1 ki point to make a ranged attack with the weapon or piece of ammunition you just caught, as part of the same reaction. You make this attack with proficiency, regardless of your weapon proficiencies, and the missile counts as a monk weapon for the attack, which has a normal range of 20 feet and a long range of 60 feet.", "ed": "2014"}, {"name": "Deflect Attacks", "source": "Class Features", "text": "When an attack roll that includes Bludgeoning, Piercing, or Slashing damage hits you, you can take a Reaction to reduce the attack's total damage by 1d10+10.\nIf you reduce the damage to 0, you can expend 1 Focus Point to redirect some of the attack's force. If you do, choose a creature you can see within 5 ft. of you if it was melee, or a creature you can see within 60 ft. that isn't behind Total Cover if the attack was ranged. The creature must succeed on a DC 14 Dex. saving throw or take 2d8+3 damage of the same type dealt by the attack.", "ed": "2024"}, {"name": "Stunning Strike", "source": "Class Features", "text": "Starting at 5th level, you can interfere with the flow of ki in an opponent's body. When you hit another creature with a melee weapon attack, you can spend 1 ki point to attempt a stunning strike. The target must succeed on a Constitution saving throw or be stunned until the end of your next turn.", "ed": "2014"}, {"name": "Stunning Strike", "source": "Class Features", "text": "Once per turn, when you hit with a Monk weapon or Unarmed Strike, you can expend 1 Focus Point to attempt a stunning strike. The target must make a DC 14 Con. saving throw. On a failed save, the target has the Stunned condition until the start of your next turn. On a successful save, the target's Speed is halved until the start of your next turn, and the next attack roll made against it has Advantage.", "ed": "2024"}, {"name": "Ki-Empowered Strikes", "source": "Class Features", "text": "Starting at 6th level, your unarmed strikes count as magical for the purpose of overcoming resistance and immunity to nonmagical attacks and damage.", "ed": "2014"}, {"name": "Empowered Strikes", "source": "Class Features", "text": "Whenever you deal damage with your Unarmed Strike, it can deal your choice of Force damage or its normal damage type.", "ed": "2024"}, {"name": "Evasion", "source": "Class Features", "text": "At 7th level, your instinctive agility lets you dodge out of the way of certain area effects, such as a blue dragon's lightning breath or a fireball spell. When you are subjected to an effect that allows you to make a Dexterity saving throw to take only half damage, you instead take no damage if you succeed on the saving throw, and only half damage if you fail.", "ed": "2014"}, {"name": "Evasion", "source": "Class Features", "text": "When subjected to an effect that allows you to make a Dex. saving throw to take only half damage, you instead take no damage if you succeed, and only half damage if you fail. You don't benefit from this feature if you have the Incapacitated condition.", "ed": "2024"}, {"name": "Stillness of Mind", "source": "Class Features", "text": "Starting at 7th level, you can use your action to end one effect on yourself that is causing you to be charmed or frightened.", "ed": "2014"}, {"name": "Open Hand Technique", "source": "Class Features", "text": "Starting when you choose this tradition at 3rd level, you can manipulate your enemy's ki when you harness your own. Whenever you hit a creature with one of the attacks granted by your Flurry of Blows, you can impose one of the following effects on that target:\n\n• It must succeed on a Dexterity saving throw or be knocked prone. • It must make a Strength saving throw. If it fails, you can push it up to 15 feet away from you. • It can't take reactions until the end of your next turn.", "ed": "2014"}, {"name": "Open Hand Technique", "source": "Class Features", "text": "When you hit a creature with an attack granted by Flurry of Blows, you can impose one of the following effects:\nAddle. The target can't make Opportunity Attacks until the start of its next turn.\nPush. The target must succeed on a DC 14 Str. saving throw or be pushed 15 ft. away from you.\nTopple. The target must succeed on a DC 14 Dex. saving throw or have the Prone condition.", "ed": "2024"}, {"name": "Wholeness of Body", "source": "Class Features", "text": "At 6th level, you gain the ability to heal yourself. As an action, you can regain hit points equal to three times your monk level. You must finish a long rest before you can use this feature again.", "ed": "2014", "uses": {"max": 1, "per": "Long Rest"}}, {"name": "Wholeness of Body", "source": "Class Features", "text": "As a Bonus Action, you can heal yourself for 1d8+3 HP. You can use this feature 3 times per Long Rest.", "ed": "2024", "uses": {"max": 3, "per": "Long Rest"}, "heal": "1d8+3"}, {"name": "Human", "source": "Species", "text": "It's hard to make generalizations about humans, but your human character has these traits. Age. Humans reach adulthood in their late teens and live less than a century. Alignment. Humans tend toward no particular alignment. The best and the worst are found among them.\n\nAbility Score Increase: All ability scores +1. Size: Medium. Speed: 30 feet.", "ed": "2014", "category": "Racial"}, {"name": "Human", "source": "Species", "text": "Size: Medium. Speed: 30 ft.\nSkillful. You gain proficiency in one skill of your choice (Investigation).\nVersatile. You gain an Origin feat of your choice (Alert).", "ed": "2024", "category": "Racial"}, {"name": "Grappler", "source": "Feat", "text": "Ability Score Increase. Increase your Str. or Dex. by 1.\nPunch and Grab. On your turn, when you hit a creature with an Unarmed Strike you can use both the Damage and the Grapple option. You can use this benefit only once per turn.\nAttack Advantage. You have Advantage on attack rolls against a creature Grappled by you.\nFast Wrestler. You don't have to spend extra movement to move a creature Grappled by you if the creature is your size or smaller.", "ed": "2024", "category": "General"}, {"name": "Alert", "source": "Feat", "text": "Initiative Proficiency. When you roll Initiative, add +3 to the roll.\nInitiative Swap. Immediately after you roll Initiative, you can swap your Initiative with the Initiative of one willing ally in the same combat. You can't make this swap if you or the ally has the Incapacitated condition.", "ed": "2024", "category": "General"}, {"name": "Grappler", "source": "Feat", "text": "The 2014 version of this feat isn't in our SRD corpus (SRD 5.1 contains no feats). Supply the 2014 text to populate the 5e version.", "ed": "2014", "category": "General"}, {"name": "Alert", "source": "Feat", "text": "The 2014 version of this feat isn't in our SRD corpus (SRD 5.1 contains no feats). Supply the 2014 text to populate the 5e version.", "ed": "2014", "category": "General"}], "proficiencies": {"armor": "None", "weapons": "Simple weapons, Hand Crossbow, Scimitar, Shortsword", "tools": "Hand Drum", "languages": "Celestial, Common, Common Sign Language, Deep Speech, Draconic"}, "equipment": [{"name": "Crossbow Bolts, +1", "qty": 5, "notes": "Ammunition (magic)."}, {"name": "Crossbow, Light", "qty": 1, "notes": "Simple, Ammunition, Loading, Two-Handed, Slow, Range 80/320."}, {"name": "Crossbow Bolts", "qty": 20, "notes": "Ammunition."}, {"name": "Shortsword", "qty": 1, "notes": "Martial, Finesse, Light, Vex."}, {"name": "Dagger", "qty": 1, "notes": "Simple, Finesse, Light, Thrown, Nick, Range 20/60."}, {"name": "Modify memory spell scroll", "qty": 1, "notes": "Custom."}, {"name": "Clothes, Common", "qty": 1, "notes": "Social, Outerwear."}, {"name": "Cook's Utensils", "qty": 1, "notes": "Utility."}, {"name": "Ink (1 ounce bottle)", "qty": 1, "notes": "Communication, Social, Utility, Consumable."}, {"name": "Small Knife", "qty": 1, "notes": "Utility."}, {"name": "Tambourine", "qty": 1, "notes": "Custom."}, {"name": "Under city entry coin", "qty": 1, "notes": "Custom."}, {"name": "Bedroll", "qty": 1, "notes": "Backpack."}, {"name": "Oil", "qty": 2, "notes": "Backpack. Damage, Utility, Combat."}, {"name": "Rations", "qty": 10, "notes": "Backpack."}, {"name": "Rope", "qty": 1, "notes": "Backpack."}, {"name": "Tinderbox", "qty": 1, "notes": "Backpack."}, {"name": "Torch", "qty": 10, "notes": "Backpack."}, {"name": "Waterskin", "qty": 1, "notes": "Backpack."}], "currency": {"cp": 0, "sp": 0, "ep": 0, "gp": 256, "pp": 0}, "notes": "Player-provided (DDB, 2024 Monk build) rebuilt on the 2014 ruleset with a 5e / 5.5e toggle. Features/attacks tagged 2014 or 2024 swap with the toggle; untagged show in both. Base 2014 (SRD) text verbatim; 2024 (5.5e) text transcribed from the owner's sheet. Per owner: DROPPED the 2024-only features with no 2014 equivalent (Uncanny Metabolism, Resourceful/Heroic Inspiration). ADDED Stillness of Mind (real 2014 Monk-7 feature) on the 5e side. Ki/Focus Points tracked as 7 uses (short rest). FLAGS: Initiative shown +6 (2024 Alert +PB); under 2014 Alert it would be +8 — kept as shown, not edition-swapped. 2014 feat text (Grappler, Alert) isn't in our SRD corpus (SRD 5.1 has no feats) — 5e-side entries are stubs pending owner text."};</script>
