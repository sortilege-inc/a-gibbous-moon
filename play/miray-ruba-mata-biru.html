<script>window.SHEET = {"id": "ahmet-yusuf", "name": "Miray Ruba Mata Biru", "player": "", "portrait": "../cabal/img/miray-ruba-mata-biru.webp", "level": 6, "classes": [{"name": "Druid", "level": 6}], "race": "Halfling", "abilities": {"str": 8, "dex": 16, "con": 12, "int": 13, "wis": 16, "cha": 11}, "saveProf": ["int", "wis"], "proficiencyBonus": 3, "skills": {"arcana": 1, "deception": 1, "insight": 1, "investigation": 1, "sleight of hand": 1, "survival": 1}, "ac": 17, "speed": 25, "hp": {"max": 44, "current": 44, "temp": 0}, "hitDice": [{"size": "d8", "total": 6}], "attacks": [{"name": "Quarterstaff (Shillelagh)", "ability": "wis", "damage": "1d8 MOD", "damageType": "bludgeoning", "range": "melee", "notes": "Shillelagh: attack & damage use WIS; magical."}, {"name": "Quarterstaff (2H)", "ability": "str", "damage": "1d8 MOD", "damageType": "bludgeoning", "range": "melee", "notes": "Versatile."}, {"name": "Dagger", "ability": "dex", "damage": "1d4 MOD", "damageType": "piercing", "range": "20/60 ft", "notes": "Finesse, light, thrown."}, {"name": "Unarmed Strike", "ability": "str", "damage": "1 MOD", "damageType": "bludgeoning", "range": "melee", "notes": ""}], "spellcasting": {"ability": "wis", "slots": {"1": {"total": 4}, "2": {"total": 2}}, "spells": [{"name": "Mending", "level": 0, "text": "Transmutation cantrip. Casting Time: 1 minute. Range: Touch. Components: V, S, M (two lodestones). Duration: Instantaneous.\n\nThis spell repairs a single break or tear in an object you touch, such as a broken chain link, two halves of a broken key, a torn cloak, or a leaking wineskin. As long as the break or tear is no larger than 1 ft in any dimension, you mend it, leaving no trace of the former damage. This spell can physically repair a magic item or construct, but it can't restore magic to such an object."}, {"name": "Shillelagh", "level": 0, "text": "Transmutation cantrip. Casting Time: 1 bonus action. Range: Touch. Components: V, S, M (mistletoe, a shamrock leaf, and a club or quarterstaff). Duration: 1 minute.\n\nThe wood of a club or quarterstaff you are holding is imbued with nature's power. For the duration, you can use your spellcasting ability (Wisdom) instead of Strength for attack and damage rolls with that weapon, and the weapon's damage die becomes a d8. The weapon also counts as magical. The spell ends if you cast it again or let go of the weapon."}, {"name": "Spare the Dying", "level": 0, "text": "Necromancy cantrip. Casting Time: 1 action. Range: Touch. Components: V, S. Duration: Instantaneous.\n\nYou touch a living creature that has 0 hit points. The creature becomes stable. This spell has no effect on undead or constructs."}, {"name": "Create or Destroy Water", "level": 1, "text": "1st-level transmutation. Casting Time: 1 action. Range: 30 ft. Components: V, S, M (a drop of water if creating, a few grains of sand if destroying). Duration: Instantaneous.\n\nYou either create or destroy water. Create: you create up to 10 gallons of clean water within range in an open container, or as rain in a 30-ft cube that extinguishes exposed flames. Destroy: you destroy up to 10 gallons of water in an open container within range, or destroy fog in a 30-ft cube. You affect 10 additional gallons (or a 5-ft-larger cube) per slot level above 1st."}, {"name": "Faerie Fire", "level": 1, "save": "DEX 14", "concentration": true, "text": "1st-level evocation. Casting Time: 1 action. Range: 60 ft. Components: V. Duration: Concentration, up to 1 minute.\n\nEach object in a 20-ft cube within range is outlined in blue, green, or violet light (your choice). Any creature in the area when the spell is cast is also outlined if it fails a Dexterity saving throw. For the duration, objects and affected creatures shed dim light in a 10-ft radius. Any attack roll against an affected creature or object has advantage if the attacker can see it, and the affected target can't benefit from being invisible."}, {"name": "Find Familiar", "level": 1, "ritual": true, "text": "1st-level conjuration (ritual). Casting Time: 1 hour. Range: 10 ft. Components: V, S, M (10 gp of charcoal, incense, and herbs consumed in a brass brazier). Duration: Instantaneous.\n\nYou gain the service of a familiar, a spirit that takes an animal form you choose. It has the chosen form's statistics but is a celestial, fey, or fiend. Your familiar acts independently but obeys your commands, can deliver your touch spells, and while within 100 ft you can communicate telepathically and see through its senses. As an action you can temporarily dismiss it to a pocket dimension or recall it."}, {"name": "Healing Word", "level": 1, "text": "1st-level evocation. Casting Time: 1 bonus action. Range: 60 ft. Components: V. Duration: Instantaneous.\n\nA creature of your choice that you can see within range regains hit points equal to 1d4 + your spellcasting ability modifier. This spell has no effect on undead or constructs. The healing increases by 1d4 for each slot level above 1st."}, {"name": "Mandate of the Sophists: Avicenna", "level": 1, "ritual": true, "concentration": true, "text": "1st-level divination (ritual). Casting Time: 1 minute. Range: Self. Components: V, S, M (a piece of old parchment with Arabic runes written on it in black ink). Duration: Concentration, up to 10 minutes.\n\nYou burn the paper, utter the words of the spell, and inhale the smoke to tap into the wisdom of Avicenna, gaining insight into how the human body works. For ten minutes, you gain advantage on Medicine checks and detect any natural disease and poison harming a body. The existence of poison and disease can be detected, but determining their exact natures requires a Medicine check of appropriate difficulty. (Historica Arcanum: City of Crescent.)"}, {"name": "Protection from Evil and Good", "level": 1, "concentration": true, "text": "1st-level abjuration. Casting Time: 1 action. Range: Touch. Components: V, S, M (holy water or powdered silver and iron, which the spell consumes). Duration: Concentration, up to 10 minutes.\n\nUntil the spell ends, one willing creature you touch is protected against aberrations, celestials, elementals, fey, fiends, and undead. Such creatures have disadvantage on attack rolls against the target, and the target can't be charmed, frightened, or possessed by them. If the target is already charmed, frightened, or possessed by such a creature, it has advantage on any new saving throw against the relevant effect."}, {"name": "Speak with Animals", "level": 1, "notes": "Always prepared (Druidic)", "ritual": true, "text": "1st-level divination (ritual). Casting Time: 1 action. Range: Self. Components: V, S. Duration: 10 minutes.\n\nYou gain the ability to comprehend and verbally communicate with beasts for the duration. The knowledge and awareness of many beasts is limited by their intelligence, but at minimum they can give you information about nearby locations and monsters, including whatever they can perceive or have perceived within the past day. You might be able to persuade a beast to perform a small favor, at the GM's discretion."}, {"name": "Detect Djinn", "level": 2, "ritual": true, "concentration": true, "text": "2nd-level divination (ritual). Casting Time: 1 action. Range: Self. Components: V, S. Duration: Concentration, up to 10 minutes.\n\nFor the duration, you sense the presence of any Djinn or Djinn-possessed vessels within 30 ft of you. If you sense a Djinni this way, you can use your action to see a faint aura around any visible creature in the area to determine its type. The spell can penetrate most barriers, but is blocked by 1 ft of stone, 1 inch of common metal, a thin sheet of lead, or 3 ft of wood or dirt. (Historica Arcanum: City of Crescent.)"}, {"name": "Lesser Restoration", "level": 2, "text": "2nd-level abjuration. Casting Time: 1 action. Range: Touch. Components: V, S. Duration: Instantaneous.\n\nYou touch a creature and can end one disease or one condition afflicting it. The condition can be blinded, deafened, paralyzed, or poisoned."}, {"name": "Pass without Trace", "level": 2, "concentration": true, "text": "2nd-level abjuration. Casting Time: 1 action. Range: Self. Components: V, S, M (ashes from burned mistletoe and a sprig of spruce). Duration: Concentration, up to 1 hour.\n\nA veil of shadows and silence radiates from you, masking you and your companions from detection. For the duration, each creature you choose within 30 ft of you (including you) has a +10 bonus to Dexterity (Stealth) checks and can't be tracked except by magical means. A creature leaves behind no tracks or other traces of its passage."}]}, "features": [{"name": "Wild Shape", "source": "Class Features", "uses": {"max": 2, "per": "Short/Long Rest"}, "text": "Bonus Action: take a learned Beast form (four known, max CR 1/4, no Fly Speed) for hours equal to half Druid level. Gain temp HP equal to Druid level; keep mental scores, HP, features, proficiencies; no spellcasting while shifted. Regain one use on a Short Rest, all on a Long Rest. Tactical forms used: black fox (scout/stealth), monitor lizard w/ Spider Climb (pursuit), combat forms."}, {"name": "Wild Companion", "source": "Class Features", "text": "Magic action: expend a slot or a Wild Shape use to cast Find Familiar (no material components); the familiar is a Fey and lasts until a Long Rest."}, {"name": "Circle of Nazar: The Good Eye", "source": "Class Features", "uses": {"max": 3, "per": "Long Rest"}, "text": "Touch a creature to detect nazars (Nazar / evil eye), curses, and spells on it and know exactly which. Learn Spare the Dying or Purifying Breath, castable as a bonus action. Spend a Wild Shape use to remove Djinnspeak effects and the evil-eye cantrip on touch."}, {"name": "Druidic", "source": "Class Features", "text": "Know the secret druid tongue; always have Speak with Animals prepared; leave hidden messages."}, {"name": "Warden", "source": "Class Features", "text": "Proficiency with Martial weapons and training with Medium armor."}, {"name": "Lucky", "source": "Racial Traits", "text": "Reroll a natural 1 on an attack, ability check, or save; must use the new roll."}, {"name": "Brave", "source": "Racial Traits", "text": "Advantage on saves against being frightened."}, {"name": "Halfling Nimbleness", "source": "Racial Traits", "text": "Move through the space of any larger creature."}, {"name": "Naturally Stealthy", "source": "Racial Traits", "text": "Can attempt to Hide even when obscured only by a creature at least one size larger."}, {"name": "Apprentice Bounty Hunter: Advanced Tracking", "source": "Feats", "text": "Gain Perception proficiency while tracking a foe. (Profession track: further perks unearned.)"}], "proficiencies": {"armor": "Light, Medium (Warden)", "weapons": "Simple, Martial (Warden)", "tools": "Herbalism Kit", "languages": "Thieves' Cant, Druidic, Turkish, Arabic"}, "inventory": [], "currency": {"cp": 0, "sp": 0, "ep": 0, "gp": 0, "pp": 0}, "notes": "Player-provided, current as of Act 3, level 6 Halfling Druid. \"Ahmet Yusuf\" is Miray's boy-courier persona (he/him in that guise); Miray is she/her. Behind the party's Night-18 level 7 — not yet fully reconciled."};</script>
