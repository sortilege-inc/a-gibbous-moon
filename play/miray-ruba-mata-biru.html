<script>window.SHEET = {"id": "ahmet-yusuf", "name": "Miray Ruba Mata Biru", "player": "", "portrait": "../cabal/img/miray-ruba-mata-biru.webp", "level": 7, "classes": [{"name": "Druid", "subclass": "Circle of Nazar", "level": 7}], "race": "Lightfoot Halfling", "abilities": {"str": 8, "dex": 16, "con": 12, "int": 13, "wis": 16, "cha": 11}, "saveProf": ["int", "wis"], "proficiencyBonus": 3, "skills": {"arcana": 1, "deception": 1, "insight": 1, "investigation": 1, "sleight of hand": 1, "survival": 1}, "ac": 17, "speed": 25, "hp": {"max": 44, "current": 44, "temp": 0}, "hitDice": [{"size": "d8", "total": 7}], "attacks": [{"name": "Hanchar", "ability": "dex", "damage": "1d4+3", "damageType": "slashing", "range": "20/60 thrown", "notes": "Simple, Finesse, Light, Thrown, Nick. Custom dagger."}, {"name": "Jereed (blunt)", "ability": "str", "damage": "1d6-1", "damageType": "bludgeoning", "range": "melee", "notes": "Simple, Versatile (1d8-1), Topple. Custom quarterstaff."}, {"name": "Wit Anggur Miwah Duri", "ability": "wis", "damage": "1d8+3", "damageType": "piercing", "range": "melee", "notes": "Martial, Sap, Versatile (1d10+3). Magic morningstar; attack & damage use WIS."}, {"name": "Yatagan", "ability": "str", "proficient": false, "damage": "1d8-1", "damageType": "slashing", "range": "melee", "notes": "Martial, Versatile (1d10-1), Sap. Not proficient (longsword)."}, {"name": "Starry Wisp", "ability": "wis", "damage": "2d8", "damageType": "radiant", "range": "60 ft.", "notes": "Cantrip · V/S · spell attack."}, {"name": "Unarmed Strike", "ability": "str", "range": "melee", "notes": "1 + STR bludgeoning (= 0). Or Grapple / Shove (Str/Dex save, DC 8 + PB + STR = 10)."}], "spellcasting": {"ability": "wis", "saveDC": 14, "attackBonus": 6, "slots": {"1": {"total": 4}, "2": {"total": 3}, "3": {"total": 3}, "4": {"total": 1}}, "spells": [{"name": "Dasi Ring Kahuripan", "level": 0, "action": "bonus", "text": "Necromancy cantrip. Casting Time: 1 bonus action. Range: Touch. Components: V, S. Duration: Instantaneous.\n\nYou touch a living creature that has 0 hit points. The creature becomes stable. This spell has no effect on undead or constructs."}, {"name": "Mending", "level": 0, "action": "other", "text": "Transmutation cantrip. Casting Time: 1 minute. Range: Touch. Components: V, S, M (two lodestones). Duration: Instantaneous.\n\nThis spell repairs a single break or tear in an object you touch, such as a broken chain link, two halves of a broken key, a torn cloak, or a leaking wineskin. As long as the break or tear is no larger than 1 foot in any dimension, you mend it, leaving no trace of the former damage. This spell can physically repair a magic item or construct, but the spell can’t restore magic to such an object."}, {"name": "Starry Wisp", "level": 0, "attack": true, "damage": "2d8", "text": "Evocation cantrip. Casting Time: 1 action. Range: 60 ft. Components: V, S. Duration: Instantaneous.\n\n(Full rules text is not in the ingested SRD 5.1 or Historica Arcanum corpus — consult the source book.)"}, {"name": "Cure Wounds", "level": 1, "heal": "1d8 MOD", "text": "1st-level evocation. Casting Time: 1 action. Range: Touch. Components: V, S. Duration: Instantaneous.\n\nA creature you touch regains a number of hit points equal to 1d8 + your spellcasting ability modifier. This spell has no effect on undead or constructs."}, {"name": "Detect Djinni", "level": 1, "concentration": true, "text": "1st-level divination. Casting Time: 1 action. Range: Self. Components: V, S. Duration: Concentration, up to 10 minutes.\n\nFor the duration, you sense the presence of magic within 30 feet of you. If you sense magic in this way, you can use your action to see a faint aura around any visible creature or object in the area that bears magic, and you learn its school of magic, if any. The spell can penetrate most barriers, but it is blocked by 1 foot of stone, 1 inch of common metal, a thin sheet of lead, or 3 feet of wood or dirt."}, {"name": "Dissonant Whispers", "level": 1, "save": "WIS 14", "damage": "3d6", "text": "1st-level enchantment. Casting Time: 1 action. Range: 60 ft. Components: V. Duration: Instantaneous.\n\n(Full rules text is not in the ingested SRD 5.1 or Historica Arcanum corpus — consult the source book.)"}, {"name": "Entangle", "level": 1, "save": "STR 14", "concentration": true, "text": "1st-level conjuration. Casting Time: 1 action. Range: 90 feet. Components: V, S. Duration: Concentration, up to 1 minute.\n\nGrasping weeds and vines sprout from the ground in a 20-foot square starting from a point within range. For the duration, these plants turn the ground in the area into difficult terrain. A creature in the area when you cast the spell must succeed on a Strength saving throw or be restrained by the entangling plants until the spell ends. A creature restrained by the plants can use its action to make a Strength check against your spell save DC. On a success, it frees itself.\n\nWhen the spell ends, the conjured plants wilt away."}, {"name": "Healing Word", "level": 1, "heal": "1d4 MOD", "action": "bonus", "text": "1st-level evocation. Casting Time: 1 bonus action. Range: 60 feet. Components: V. Duration: Instantaneous.\n\nA creature of your choice that you can see within range regains hit points equal to 1d4 + your spellcasting ability modifier. This spell has no effect on undead or constructs."}, {"name": "Jump", "level": 1, "text": "1st-level transmutation. Casting Time: 1 action. Range: Touch. Components: V, S, M (a grasshopper’s hind leg). Duration: 1 minute.\n\nYou touch a creature. The creature’s jump distance is tripled until the spell ends."}, {"name": "Nglawan Sane Nenten Alami", "level": 1, "concentration": true, "text": "1st-level abjuration. Casting Time: 1 action. Range: Touch. Components: V, S, M (holy water or powdered silver and iron, which the spell consumes). Duration: Concentration up to 10 minutes.\n\nUntil the spell ends, one willing creature you touch is protected against certain types of creatures: aberrations, celestials, elementals, fey, fiends, and undead. The protection grants several benefits. Creatures of those types have disadvantage on attack rolls against the target. The target also can’t be charmed, frightened, or possessed by them. If the target is already charmed, frightened, or possessed by such a creature, the target has advantage on any new saving throw against the relevant effect."}, {"name": "Speak with Animals", "level": 1, "ritual": true, "text": "1st-level divination. Casting Time: 1 action. Range: Self. Components: V, S. Duration: 10 minutes.\n\nYou gain the ability to comprehend and verbally communicate with beasts for the duration. The knowledge and awareness of many beasts is limited by their intelligence, but at minimum, beasts can give you information about nearby locations and monsters, including whatever they can perceive or have perceived within the past day. You might be able to persuade a beast to perform a small favor for you, at the GM’s discretion."}, {"name": "Nenten Kaonang", "level": 2, "text": "2nd-level abjuration. Casting Time: 1 action. Range: Touch. Components: V, S. Duration: Instantaneous.\n\nYou touch a creature and can end either one disease or one condition afflicting it. The condition can be blinded, deafened, paralyzed, or poisoned."}, {"name": "Misty Step", "level": 2, "action": "bonus", "text": "2nd-level conjuration. Casting Time: 1 bonus action. Range: Self. Components: V. Duration: Instantaneous.\n\nBriefly surrounded by silvery mist, you teleport up to 30 feet to an unoccupied space that you can see."}, {"name": "Moonbeam", "level": 2, "save": "CON 14", "damage": "2d10", "concentration": true, "text": "2nd-level evocation. Casting Time: 1 action. Range: 120 feet. Components: V, S, M (several seeds of any moonseed plant and a piece of opalescent feldspar). Duration: Concentration, up to 1 minute.\n\nA silvery beam of pale light shines down in a 5-foot-radius, 40-foot-high cylinder centered on a point within range. Until the spell ends, dim light fills the cylinder. When a creature enters the spell’s area for the first time on a turn or starts its turn there, it is engulfed in ghostly flames that cause searing pain, and it must make a Constitution saving throw. It takes 2d10 radiant damage on a failed save, or half as much damage on a successful one. A shapechanger makes its saving throw with disadvantage. If it fails, it also instantly reverts to its original form and can’t assume a different form until it leaves the spell’s light. On each of your turns after you cast this spell, you can use an action to move the beam 60 feet in any direction."}, {"name": "Call Lightning", "level": 3, "save": "DEX 14", "damage": "3d10", "concentration": true, "text": "3rd-level conjuration. Casting Time: 1 action. Range: 120 feet. Components: V, S. Duration: Concentration, up to 10 minutes.\n\nA storm cloud appears in the shape of a cylinder that is 10 feet tall with a 60-foot radius, centered on a point you can see 100 feet directly above you. The spell fails if you can’t see a point in the air where the storm cloud could appear (for example, if you are in a room that can’t accommodate the cloud). When you cast the spell, choose a point you can see within range. A bolt of lightning flashes down from the cloud to that point. Each creature within 5 feet of that point must make a Dexterity saving throw. A creature takes 3d10 lightning damage on a failed save, or half as much damage on a successful one. On each of your turns until the spell ends, you can use your action to call down lightning in this way again, targeting the same point or a different one. If you are outdoors in stormy conditions when you cast this spell, the spell gives you control over the existing storm instead of creating a new one. Under such conditions, the spell’s damage increases by 1d10."}, {"name": "Conjure Animals", "level": 3, "concentration": true, "text": "3rd-level conjuration. Casting Time: 1 action. Range: 60 feet. Components: V, S. Duration: Concentration, up to 1 hour.\n\nYou summon fey spirits that take the form of beasts and appear in unoccupied spaces that you can see within range. Choose one of the following options for what appears:\n\n• One beast of challenge rating 2 or lower • Two beasts of challenge rating 1 or lower • Four beasts of challenge rating 1/2 or lower • Eight beasts of challenge rating 1/4 or lower\n\nEach beast is also considered fey, and it disappears when it drops to 0 hit points or when the spell ends.\n\nThe summoned creatures are friendly to you and your companions. Roll initiative for the summoned creatures as a group, which has its own turns. They obey any verbal commands that you issue to them (no action required by you). If you don’t issue any commands to them, they defend themselves from hostile creatures, but otherwise take no actions.\n\nThe GM has the creatures’ statistics."}, {"name": "Remove Curse", "level": 3, "text": "3rd-level abjuration. Casting Time: 1 action. Range: Touch. Components: V, S. Duration: Instantaneous.\n\nAt your touch, all curses affecting one creature or object end. If the object is a cursed magic item, its curse remains, but the spell breaks its owner’s attunement to the object so it can be removed or discarded."}, {"name": "Revivify", "level": 3, "text": "3rd-level necromancy. Casting Time: 1 action. Range: Touch. Components: V, S, M (diamonds worth 300 gp, which the spell consumes). Duration: Instantaneous.\n\nYou touch a creature that has died within the last minute. That creature returns to life with 1 hit point. This spell can’t return to life a creature that has died of old age, nor can it restore any missing body parts."}, {"name": "Banishment", "level": 4, "save": "CHA 14", "concentration": true, "text": "4th-level abjuration. Casting Time: 1 action. Range: 60 feet. Components: V, S, M (an item distasteful to the target). Duration: Concentration, up to 1 minute.\n\nYou attempt to send one creature that you can see within range to another plane of existence. The target must succeed on a Charisma saving throw or be banished.\n\nIf the target is native to the plane of existence you’re on, you banish the target to a harmless demiplane. While there, the target is incapacitated. The target remains there until the spell ends, at which point the target reappears in the space it left or in the nearest unoccupied space if that space is occupied. If the target is native to a different plane of existence than the one you’re on, the target is banished with a faint popping noise, returning to its home plane. If the spell ends before 1 minute has passed, the target reappears in the space it left or in the nearest unoccupied space if that space is occupied. Otherwise, the target doesn’t return."}, {"name": "Divination", "level": 4, "ritual": true, "text": "4th-level divination. Casting Time: 1 action. Range: Self. Components: V, S, M (incense and a sacrificial offering appropriate to your religion, together worth at least 25 gp, which the spell consumes). Duration: Instantaneous.\n\nYour magic and an offering put you in contact with a god or a god’s servants. You ask a single question concerning a specific goal, event, or activity to occur within 7 days. The GM offers a truthful reply. The reply might be a short phrase, a cryptic rhyme, or an omen. The spell doesn’t take into account any possible circumstances that might change the outcome, such as the casting of additional spells or the loss or gain of a companion. If you cast the spell two or more times before finishing your next long rest, there is a cumulative 25 percent chance for each casting after the first that you get a random reading. The GM makes this roll in secret."}, {"name": "Polymorph", "level": 4, "save": "WIS 14", "concentration": true, "text": "4th-level transmutation. Casting Time: 1 action. Range: 60 feet. Components: V, S, M (a caterpillar cocoon). Duration: Concentration, up to 1 hour.\n\nThis spell transforms a creature that you can see within range into a new form. An unwilling creature must make a Wisdom saving throw to avoid the effect. The spell has no effect on a shapechanger or a creature with 0 hit points. The transformation lasts for the duration, or until the target drops to 0 hit points or dies. The new form can be any beast whose challenge rating is equal to or less than the target’s (or the target’s level, if it doesn’t have a challenge rating). The target’s game statistics, including mental ability scores, are replaced by the statistics of the chosen beast. It retains its alignment and personality. The target assumes the hit points of its new form. When it reverts to its normal form, the creature returns to the number of hit points it had before it transformed. If it reverts as a result of dropping to 0 hit points, any excess damage carries over to its normal form. As long as the excess damage doesn’t reduce the creature’s normal form to 0 hit points, it isn’t knocked unconscious. The creature is limited in the actions it can perform by the nature of its new form, and it can’t speak, cast spells, or take any other action that requires hands or speech. The target’s gear melds into the new form. The creature can’t activate, use, wield, or otherwise benefit from any of its equipment."}]}, "features": [{"name": "Druidic", "source": "Druid", "text": "You know Druidic, the secret language of druids."}, {"name": "Spellcasting", "source": "Druid", "text": "You can cast prepared druid spells using WIS as your spellcasting modifier (Spell save DC 14, Spell Attack +6) and prepared druid spells as rituals if they have the ritual tag. You can use a druidic focus as a spellcasting focus."}, {"name": "Wild Shape", "source": "Druid", "uses": {"max": 2, "per": "short rest"}, "text": "As an action, you can magically assume the shape of a beast that you have seen before twice per short rest. [2nd] Max CR 1/4 (no flying or swimming speed) [4th] Max CR 1/2 (no flying speed) [8th] Max CR 1\n\nYou can stay in beast shape for 3 hours before reverting back to your normal form (or as a bonus action earlier or if you fall unconscious, drop to 0 hit points, or die)."}, {"name": "Wild Shape Improvement", "source": "Druid", "text": "While using your Wild Shape feature, you can transform into beasts of CR 1/2 or lower that don't have a flying speed."}, {"name": "Wild Shape Forms (CR ≤ 1/2, no fly)", "source": "Druid", "text": "Eligible beast forms at this tier: any beast of CR 1/2 or lower with no flying speed (49 forms below, from the SRD).\nSwarms (Swarm of Rats/Insects) and water-only forms are a table's-call.\n\n── CR 0 ──\nBaboon — Small beast. AC 12, HP 3 (1d6), Speed 30 ft., climb 30 ft.. STR 8 DEX 14 CON 11 INT 4 WIS 12 CHA 6.\n  • Pack Tactics. The baboon has advantage on an attack roll against a creature if at least one of the baboon’s allies is within 5 feet of the creature and the ally isn’t incapacitated.\n  ⚔ Bite. Melee Weapon Attack: +1 to hit, reach 5 ft., one target. Hit: 1 (1d4 − 1) piercing damage.\n\nBadger — Tiny beast. AC 10, HP 3 (1d4 + 1), Speed 20 ft., burrow 5 ft.. STR 4 DEX 11 CON 12 INT 2 WIS 12 CHA 5.\n  • Keen Smell. The badger has advantage on Wisdom (Perception) checks that rely on smell.\n  ⚔ Bite. Melee Weapon Attack: +2 to hit, reach 5 ft., one target. Hit: 1 piercing damage.\n\nCat — Tiny beast. AC 12, HP 2 (1d4), Speed 40 ft., climb 30 ft.. STR 3 DEX 15 CON 10 INT 3 WIS 12 CHA 7. Skills Perception +3, Stealth +4.\n  • Keen Smell. The cat has advantage on Wisdom (Perception) checks that rely on smell.\n  ⚔ Claws. Melee Weapon Attack: +0 to hit, reach 5 ft., one target. Hit: 1 slashing damage.\n\nCrab — Tiny beast. AC 11 (natural armor), HP 2 (1d4), Speed 20 ft., swim 20 ft.. STR 2 DEX 11 CON 10 INT 1 WIS 8 CHA 2. Skills Stealth +2.\n  • Amphibious. The crab can breathe air and water.\n  ⚔ Claw. Melee Weapon Attack: +0 to hit, reach 5 ft., one target. Hit: 1 bludgeoning damage.\n\nDeer — Medium beast. AC 13, HP 4 (1d8), Speed 50 ft.. STR 11 DEX 16 CON 11 INT 2 WIS 14 CHA 5.\n  ⚔ Bite. Melee Weapon Attack: +2 to hit, reach 5 ft., one target. Hit: 2 (1d4) piercing damage.\n\nFrog — Tiny beast. AC 11, HP 1 (1d4 − 1), Speed 20 ft., swim 20 ft.. STR 1 DEX 13 CON 8 INT 1 WIS 8 CHA 3. Skills Perception +1, Stealth +3.\n  • Amphibious. The frog can breathe air and water.\n  • Standing Leap. The frog’s long jump is up to 10 feet and its high jump is up to 5 feet, with or without a running start.\n\nGiant Fire Beetle — Small beast. AC 13 (natural armor), HP 4 (1d6 + 1), Speed 30 ft.. STR 8 DEX 10 CON 12 INT 1 WIS 7 CHA 3.\n  • Illumination. The beetle sheds bright light in a 10-foot radius and dim light for an additional 10 feet.\n  ⚔ Bite. Melee Weapon Attack: +1 to hit, reach 5 ft., one target. Hit: 2 (1d6 − 1) slashing damage.\n\nGoat — Medium beast. AC 10, HP 4 (1d8), Speed 40 ft.. STR 12 DEX 10 CON 11 INT 2 WIS 10 CHA 5.\n  • Charge. If the goat moves at least 20 feet straight toward a target and then hits it with a ram attack on the same turn, the target takes an extra 2 (1d4) bludgeoning damage. If the target is a creature, it must succeed on a DC 10 Strength saving throw or be knocked prone.\n  • Sure-Footed. The goat has advantage on Strength and Dexterity saving throws made against effects that would knock it prone.\n  ⚔ Ram. Melee Weapon Attack: +3 to hit, reach 5 ft., one target. Hit: 3 (1d4 + 1) bludgeoning damage.\n\nHyena — Medium beast. AC 11, HP 5 (1d8 + 1), Speed 50 ft.. STR 11 DEX 13 CON 12 INT 2 WIS 12 CHA 5. Skills Perception +3.\n  • Pack Tactics. The hyena has advantage on an attack roll against a creature if at least one of the hyena’s allies is within 5 feet of the creature and the ally isn’t incapacitated.\n  ⚔ Bite. Melee Weapon Attack: +2 to hit, reach 5 ft., one target. Hit: 3 (1d6) piercing damage.\n\nJackal — Small beast. AC 12, HP 3 (1d6), Speed 40 ft.. STR 8 DEX 15 CON 11 INT 3 WIS 12 CHA 6. Skills Perception +3.\n  • Keen Hearing and Smell. The jackal has advantage on Wisdom (Perception) checks that rely on hearing or smell.\n  • Pack Tactics. The jackal has advantage on an attack roll against a creature if at least one of the jackal’s allies is within 5 feet of the creature and the ally isn’t incapacitated.\n  ⚔ Bite. Melee Weapon Attack: +1 to hit, reach 5 ft., one target. Hit: 1 (1d4 – 1) piercing damage.\n\nLizard — Tiny beast. AC 10, HP 2 (1d4), Speed 20 ft., climb 20 ft.. STR 2 DEX 11 CON 10 INT 1 WIS 8 CHA 3.\n  ⚔ Bite. Melee Weapon Attack: +0 to hit, reach 5 ft., one target. Hit: 1 piercing damage.\n\nOctopus — Small beast. AC 12, HP 3 (1d6), Speed 5 ft., swim 30 ft.. STR 4 DEX 15 CON 11 INT 3 WIS 10 CHA 4. Skills Perception +2, Stealth +4.\n  • Hold Breath. While out of water, the octopus can hold its breath for 30 minutes.\n  • Underwater Camouflage. The octopus has advantage on Dexterity (Stealth) checks made while underwater.\n  • Water Breathing. The octopus can breathe only underwater.\n  ⚔ Tentacles. Melee Weapon Attack: +4 to hit, reach 5 ft., one target. Hit: 1 bludgeoning damage, and the target is grappled (escape DC 10). Until this grapple ends, the octopus can’t use its tentacles on another target.\n  ⚔ Ink Cloud (Recharges after a Short or Long Rest). A 5-foot-radius cloud of ink extends all around the octopus if it is underwater. The area is heavily obscured for 1 minute, although a significant current can disperse the ink. After releasing the ink, the octopus can use the Dash action as a bonus action.\n\nQuipper — Tiny beast. AC 13, HP 1 (1d4 − 1), Speed 0 ft., swim 40 ft.. STR 2 DEX 16 CON 9 INT 1 WIS 7 CHA 2.\n  • Blood Frenzy. The quipper has advantage on melee attack rolls against any creature that doesn’t have all its hit points.\n  • Water Breathing. The quipper can breathe only underwater.\n  ⚔ Bite. Melee Weapon Attack: +5 to hit, reach 5 ft., one target. Hit: 1 piercing damage.\n\nRat — Tiny beast. AC 10, HP 1 (1d4 − 1), Speed 20 ft.. STR 2 DEX 1 ast. AC 15 (natural armor), HP 13 (3d8), Speed 30 ft., swim 30 ft.. STR 13 DEX 15 CON 11 INT 1 WIS 9 CHA 3. Skills Stealth +4.\n  • Amphibious. The crab can breathe air and water.\n  ⚔ Claw. Melee Weapon Attack: +3 to hit, reach 5 ft., one target. Hit: 4 (1d6 + 1) bludgeoning damage, and the target is grappled (escape DC 11). The crab has two claws, each of which can grapple only one target.\n\nGiant Rat — Small beast. AC 12, HP 7 (2d6), Speed 30 ft.. STR 7 DEX 15 CON 11 INT 2 WIS 10 CHA 4.\n  • Keen Smell. The rat has advantage on Wisdom (Perception) checks that rely on smell.\n  • Pack Tactics. The rat has advantage on an attack roll against a creature if at least one of the rat’s allies is within 5 feet of the creature and the ally isn’t incapacitated.\n  ⚔ Bite. Melee Weapon Attack: +4 to hit, reach 5 ft., one target. Hit: 4 (1d4 + 2) piercing damage.\n\nGiant Weasel — Medium beast. AC 13, HP 9 (2d8), Speed 40 ft.. STR 11 DEX 16 CON 10 INT 4 WIS 12 CHA 5. Skills Perception +3, Stealth +5.\n  • Keen Hearing and Smell. The weasel has advantage on Wisdom (Perception) checks that rely on hearing or smell.\n  ⚔ Bite. Melee Weapon Attack: +5 to hit, reach 5 ft., one target. Hit: 5 (1d4 + 3) piercing damage.\n\nMastiff — Medium beast. AC 12, HP 5 (1d8 + 1), Speed 40 ft.. STR 13 DEX 14 CON 12 INT 3 WIS 12 CHA 7. Skills Perception +3.\n  • Keen Hearing and Smell. The mastiff has advantage on Wisdom (Perception) checks that rely on hearing or smell.\n  ⚔ Bite. Melee Weapon Attack: +3 to hit, reach 5 ft., one target. Hit: 4 (1d6 + 1) piercing damage. If the target is a creature, it must succeed on a DC 11 Strength saving throw or be knocked prone.\n\nMule — Medium beast. AC 10, HP 11 (2d8 + 2), Speed 40 ft.. STR 14 DEX 10 CON 13 INT 2 WIS 10 CHA 5.\n  • Beast of Burden. The mule is considered to be a Large animal for the purpose of determining its carrying capacity.\n  • Sure-Footed. The mule has advantage on Strength and Dexterity saving throws made against effects that w
