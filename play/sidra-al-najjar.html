<script>window.SHEET = {"id": "sidra-al-najjar", "name": "Sidra al-Najjar", "player": "", "portrait": "../cabal/img/sidra-al-najjar.webp", "level": 2, "classes": [{"name": "Sorcerer", "level": 2}], "race": "Tiefling", "abilities": {"str": 12, "dex": 14, "con": 10, "int": 18, "wis": 11, "cha": 14}, "saveProf": ["con", "cha"], "proficiencyBonus": 2, "skills": {"deception": 1, "insight": 1, "religion": 1}, "ac": 12, "speed": 30, "initiative": 0, "hp": {"max": 6, "current": 6, "temp": 0}, "hitDice": [{"size": "d6", "total": 2}], "attacks": [{"name": "Dagger", "ability": "dex", "damage": "1d4 MOD", "damageType": "piercing", "range": "20/60 ft", "notes": "Finesse, light, thrown."}], "features": [{"name": "Core Sorcerer Traits", "source": "Class Features", "text": "As a Level 1 Character: Gain all the traits in the Core Sorcerer Traits table. Gain the Sorcerer’s level 1 features. <table class=\"table-compendium table--left-all\" style=\"--sb-table-row-bg-hover: b3d3df; --sb-table-row-bg-dark: d7e8ee; --sb-table-row-bg-light: f1f7f9; --dark-sb-table-row-bg-light: 5e7982; --dark-sb-table-row-bg-dark: 5c7f8c; --dark-sb-table-row-bg-hover: 78a2b0;\" <caption Core Sorcerer Traits</caption <thead </thead <tbody <tr <th Primary Ability</th <td Charisma</td </tr <tr <th Hit Point Die</th <td D6 per Sorcerer level</td </tr <tr <th Saving Throw Proficiencies</th <td Constitution and Charisma</td </tr <tr <th Skill Proficiencies</th <td <em Choose 2:</em Arcana, Dece"}, {"name": "Spellcasting", "source": "Class Features", "text": "Drawing from your innate magic, you can cast spells. Cantrips. You know four Sorcerer cantrips of your choice. Whenever you gain a Sorcerer level, you can replace one of your cantrips from this feature with another Sorcerer cantrip of your choice. When you reach Sorcerer levels 4 and 10, you learn another Sorcerer cantrip of your choice, as shown in the Cantrips column of the Sorcerer Features table. Spell Slots. The Sorcerer Features table shows how many spell slots you have to cast your level 1+ spells. You regain all expended slots when you finish a Long Rest. Prepared Spells of Level 1+. You prepare the list of level 1+ spells that are available for you to cast with this feature. To star"}, {"name": "Innate Sorcery", "source": "Class Features", "text": "An event in your past left an indelible mark on you, infusing you with simmering magic. As a Bonus Action, you can unleash that magic for 1 minute, during which you gain the following benefits: The spell save DC of your Sorcerer spells increases by 1. You have Advantage on the attack rolls of Sorcerer spells you cast. You can use this feature twice, and you regain all expended uses of it when you finish a Long Rest."}, {"name": "Djinntouched", "source": "Class Features", "text": "Starting at 1st level, you learn the Djinnspeak, the tongue of the Al-Ghaib and your inner djinn’s influence will start to have effects on the world around you. When you expend one of your 1st level spell slots by touching a creature, you can force that creature to make a saving throw against your spell save DC. On a failed save you choose one of the effects below: - The creature loses the ability to speak for 1 hour. - The creature gains one level of exhaustion. (You can’t make it exceed two levels of exhaustion.) - The creature has a fear of the dark. It has disadvantage on saving throws in dim light and darkness. It lasts for 1 hour. You can only use 1st level spell slots for this ability"}, {"name": "Ability Score Increases", "source": "Racial Traits", "text": "When determining your character’s ability scores, increase one score by 2 and a different one by 1, or increase three scores by 1. None of these increases can raise a score above 20."}, {"name": "Size", "source": "Racial Traits", "text": "You are Medium (about 4–7 feet tall) or Small (about 3–4 feet tall), chosen when you select this species."}, {"name": "Speed", "source": "Racial Traits", "text": "You have a Speed of 30 feet."}, {"name": "Darkvision", "source": "Racial Traits", "text": "You have Darkvision with a range of 60 feet."}, {"name": "Fiendish Legacy", "source": "Racial Traits", "text": "You are the recipient of a legacy that grants you supernatural abilities. Choose a legacy from the Fiendish Legacies table. You gain the level 1 benefit of the chosen legacy. When you reach character levels 3 and 5, you learn a higher-level spell, as shown on the table. You always have that spell prepared. You can cast it once without a spell slot, and you regain the ability to cast it in that way when you finish a Long Rest. You can also cast the spell using any spell slots you have of the appropriate level. Intelligence, Wisdom, or Charisma is your spellcasting ability for the spells you cast with this trait (choose the ability when you select the legacy). Fiendish Legacies | Legacy | Leve"}, {"name": "Otherworldly Presence", "source": "Racial Traits", "text": "You know the Thaumaturgy cantrip. When you cast it with this trait, the spell uses the same spellcasting ability you use for your Fiendish Legacy Trait."}, {"name": "Fiendish Legacy Spells", "source": "Racial Traits", "text": "When you choose your Fiendish Legacy, and at character levels 3 and 5, you learn a spell as shown on the table. You always have that spell prepared. You can cast it once without a spell slot, and you regain the ability to cast it in that way when you finish a Long Rest. You can also cast the spell using any spell slots you have of the appropriate level. Intelligence, Wisdom, or Charisma is your spellcasting ability for the spells you cast with this trait (choose the ability when you select the legacy)."}, {"name": "Languages", "source": "Racial Traits", "text": "Your character knows at least three languages: Common plus two languages you roll or choose from the Standard Languages table. Knowledge of a language means your character can communicate in it, read it, and write it. Your class and other features might also give you languages. The Standard Languages table lists languages that are widespread on D&D worlds. Every player character knows Common, which originated in the planar metropolis of Sigil, the hub of the multiverse. The other standard languages originated with the first members of the most prominent species in the worlds of D&D and have since spread widely. Standard Languages | 1d12 | Language | Origin | | --- | --- | --- | | — | Common "}, {"name": "Acolyte Ability Score Improvements", "source": "Feats", "text": "The Acolyte Background allows you to choose between Intelligence, Wisdom, and Charisma. Increase one of these scores by 2 and another one by 1, or increase all three by 1. None of these increases can raise a score above 20."}, {"name": "Magic Initiate (Cleric)", "source": "Feats", "text": "Origin Feat You gain the following benefits. Two Cantrips. You learn two cantrips of your choice from the Cleric spell list. Intelligence, Wisdom, or Charisma is your spellcasting ability for this feat’s spells (choose when you select this feat). Level 1 Spell. Choose a level 1 spell from the same list you selected for this feat’s cantrips. You always have that spell prepared. You can cast it once without a spell slot, and you regain the ability to cast it in that way when you finish a Long Rest. You can also cast the spell using any spell slots you have. Spell Change. Whenever you gain a new level, you can replace one of the spells you chose for this feat with a different spell of the same "}, {"name": "Dark Bargain", "source": "Feats", "text": "At your GM's discretion, you can take a Dark Bargain."}], "proficiencies": {"armor": "", "weapons": "", "tools": "Calligrapher's Supplies", "languages": "Common, Draconic, Common Sign Language"}, "inventory": [{"name": "blowgun", "qty": 1, "notes": "Proficiency with a Spear allows you to add your proficiency bonus to the attack roll for any attack you make with it. This weapon has the following mastery property. To use this pr"}, {"name": "Parchment", "qty": 1, "notes": "One sheet of Parchment can hold about 250 handwritten words."}, {"name": "Backpack", "qty": 1, "notes": "A Backpack holds up to 30 pounds within 1 cubic foot. It can also serve as a saddlebag."}, {"name": "Calligrapher's Supplies", "qty": 1, "notes": "Ability: Dexterity Utilize: Write text with impressive flourishes that guard against forgery (DC 15) Craft: Ink, Spell Scroll If you have proficiency with a tool, add your Proficie"}, {"name": "Robe", "qty": 1, "notes": "A Robe has vocational or ceremonial significance. Some events and locations admit only people wearing a Robe bearing certain colors or symbols."}, {"name": "Book", "qty": 1, "notes": "A Book contains fiction or nonfiction. If you consult an accurate nonfiction Book about its topic, you gain a +5 bonus to Intelligence (Arcana, History, Nature, or Religion) checks"}, {"name": "Holy Symbol", "qty": 1, "notes": "A Holy Symbol takes one of the forms in the Holy Symbol table and is bejeweled or painted to channel divine magic. A Cleric or Paladin can use a Holy Symbol as a Spellcasting Focus"}, {"name": "Crystal", "qty": 1, "notes": "An Arcane Focus is bejeweled or carved to channel arcane magic. A Sorcerer, Warlock, or Wizard can use such an item as a Spellcasting Focus."}, {"name": "Oil", "qty": 1, "notes": "You can douse a creature, object, or space with Oil or use it as fuel, as detailed below. Dousing a Creature or an Object. When you take the Attack action, you can replace one of y"}, {"name": "Rations", "qty": 1, "notes": "Rations consist of travel-ready food, including jerky, dried fruit, hardtack, and nuts. See “Malnutrition” for the risks of not eating."}, {"name": "Rope", "qty": 1, "notes": "As a Utilize action, you can tie a knot with Rope if you succeed on a DC 10 Dexterity (Sleight of Hand) check. The Rope can be burst with a successful DC 20 Strength (Athletics) ch"}, {"name": "Tinderbox", "qty": 1, "notes": "A Tinderbox is a small container holding flint, fire steel, and tinder (usually dry cloth soaked in light oil) used to kindle a fire. Using it to light a Candle, Lamp, Lantern, or "}, {"name": "Torch", "qty": 1, "notes": "A Torch burns for 1 hour, casting Bright Light in a 20-foot radius and Dim Light for an additional 20 feet. When you take the Attack action, you can attack with the Torch, using it"}, {"name": "Waterskin", "qty": 1, "notes": "A Waterskin holds up to 4 pints. If you don’t drink sufficient water, you risk dehydration."}, {"name": "Caltrops", "qty": 1, "notes": "As a Utilize action, you can spread Caltrops from their bag to cover a 5-foot-square area within 5 feet of yourself. A creature that enters this area for the first time on a turn m"}, {"name": "Crowbar", "qty": 1, "notes": "Using a Crowbar gives you Advantage on Strength checks where the Crowbar’s leverage can be applied."}], "currency": {"cp": 0, "sp": 0, "ep": 0, "gp": 86, "pp": 0}, "notes": "Snapshot from Alchemy, 5 Nov 2025 (early-campaign, level 2) — a placeholder pending the Phase 3 refresh to the party's current state."};</script>
