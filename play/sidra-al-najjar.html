<script>window.SHEET = {"id": "sidra-al-najjar", "name": "Sidra al-Najjar", "player": "", "portrait": "../cabal/img/sidra-al-najjar.webp", "level": 7, "classes": [{"name": "Warlock", "subclass": "Djinnmaster", "level": 7}], "race": "Tiefling (Infernal)", "abilities": {"str": 12, "dex": 14, "con": 10, "int": 18, "wis": 11, "cha": 16}, "saveProf": ["con", "cha"], "proficiencyBonus": 3, "skills": {"deception": 1, "insight": 1, "nature": 1, "religion": 1}, "ac": 15, "speed": 30, "hp": {"max": 39, "current": 39, "temp": 0}, "hitDice": [{"size": "d6", "total": 7}], "attacks": [{"name": "Unarmed Strike", "ability": "str", "damage": "1 MOD", "damageType": "bludgeoning", "range": "melee", "notes": ""}], "spellcasting": {"ability": "cha", "saveDC": 14, "attackBonus": 6, "slots": {"4": {"total": 2, "recharge": "short"}}, "spells": [{"name": "Fire Bolt", "level": 0, "attack": true, "damage": "2d10", "text": "Evocation cantrip. Casting Time: 1 action. Range: 120 ft. Components: V, S. Duration: Instantaneous.\n\nYou hurl a mote of fire at a creature or object within range. Make a ranged spell attack against the target. On a hit, it takes 2d10 fire damage. A flammable object hit by this spell ignites if it isn't being worn or carried. The damage increases with your level (1d10 at 1st, 2d10 at 5th, 3d10 at 11th, 4d10 at 17th)."}, {"name": "Guidance", "level": 0, "concentration": true, "text": "Divination cantrip. Casting Time: 1 action. Range: Touch. Components: V, S. Duration: Concentration, up to 1 minute.\n\nYou touch a willing creature. Once before the spell ends, the target can roll a d4 and add the number rolled to one ability check of its choice. It can roll the die before or after making the check. The spell then ends."}, {"name": "Message", "level": 0, "text": "Transmutation cantrip. Casting Time: 1 action. Range: 120 ft. Components: V, S, M (a short piece of copper wire). Duration: 1 round.\n\nYou point toward a creature within range and whisper a message. The target (and only the target) hears the message and can reply in a whisper that only you can hear. You can cast this spell through solid objects if you are familiar with the target and know it is beyond the barrier."}, {"name": "Nazar the Bead", "level": 0, "save": "WIS 14", "text": "Enchantment cantrip. Casting Time: 1 action. Range: 30 ft. Components: S, M (a small nazar bead worth 1 cp, which the spell consumes). Duration: Varies.\n\nYou crush the nazar bead in your hand and blow the dust at a creature of your choice within 30 ft. That creature must make a Wisdom saving throw or make its next ability check or attack roll with disadvantage. (Historica Arcanum: City of Crescent.)"}, {"name": "Resistance", "level": 0, "concentration": true, "text": "Abjuration cantrip. Casting Time: 1 action. Range: Touch. Components: V, S, M (a miniature cloak). Duration: Concentration, up to 1 minute.\n\nYou touch a willing creature. Once before the spell ends, the target can roll a d4 and add the number rolled to one saving throw of its choice. It can roll the die before or after making the save. The spell then ends."}, {"name": "Sacred Flame", "level": 0, "save": "DEX 14", "damage": "2d8", "text": "Evocation cantrip. Casting Time: 1 action. Range: 60 ft. Components: V, S. Duration: Instantaneous.\n\nFlame-like radiance descends on a creature you can see within range. The target must succeed on a Dexterity saving throw or take 2d8 radiant damage. The target gains no benefit from cover for this save. The damage increases with your level (1d8 at 1st, 2d8 at 5th, 3d8 at 11th, 4d8 at 17th)."}, {"name": "Spare the Dying", "level": 0, "text": "Necromancy cantrip. Casting Time: 1 action. Range: Touch. Components: V, S. Duration: Instantaneous.\n\nYou touch a living creature that has 0 hit points. The creature becomes stable. This spell has no effect on undead or constructs."}, {"name": "Thaumaturgy", "level": 0, "text": "Transmutation cantrip. Casting Time: 1 action. Range: 30 ft. Components: V. Duration: Up to 1 minute.\n\nYou manifest a minor wonder within range: your voice booms up to three times as loud, you cause flames to flicker/brighten/dim/change color, you cause harmless tremors, you create an instantaneous sound, you cause an unlocked door or window to fly open or slam shut, or you alter the appearance of your eyes. You can have up to three of its 1-minute effects active at once."}, {"name": "True Strike", "level": 0, "concentration": true, "text": "Divination cantrip. Casting Time: 1 action. Range: 30 ft. Components: S. Duration: Concentration, up to 1 round.\n\nYou point a finger at a target in range. Your magic grants you a brief insight into the target's defenses. On your next turn, you gain advantage on your first attack roll against the target, provided this spell hasn't ended."}, {"name": "Charm Person", "level": 1, "save": "WIS 14", "text": "1st-level enchantment. Casting Time: 1 action. Range: 30 ft. Components: V, S. Duration: 1 hour.\n\nYou attempt to charm a humanoid you can see within range. It must make a Wisdom saving throw, with advantage if you or your companions are fighting it. On a failed save, it is charmed by you until the spell ends or until you or your companions do anything harmful to it. The charmed creature regards you as a friendly acquaintance. When the spell ends, it knows it was charmed."}, {"name": "Cure Wounds", "level": 1, "text": "1st-level evocation. Casting Time: 1 action. Range: Touch. Components: V, S. Duration: Instantaneous.\n\nA creature you touch regains hit points equal to 1d8 + your spellcasting ability modifier. This spell has no effect on undead or constructs. Roll an additional 1d8 for each slot level above 1st.", "heal": "1d8 MOD"}, {"name": "Hellish Rebuke", "level": 1, "save": "DEX 14", "damage": "2d10", "text": "1st-level evocation. Casting Time: 1 reaction, which you take in response to being damaged by a creature within 60 ft that you can see. Range: 60 ft. Components: V, S. Duration: Instantaneous.\n\nYou point at the creature that damaged you and it is momentarily surrounded in hellish flames. It must make a Dexterity saving throw, taking 2d10 fire damage on a failed save, or half as much on a success. The damage increases by 1d10 for each slot level above 1st."}, {"name": "Shield", "level": 1, "text": "1st-level abjuration. Casting Time: 1 reaction, which you take when you are hit by an attack or targeted by the magic missile spell. Range: Self. Components: V, S. Duration: 1 round.\n\nAn invisible barrier of magical force appears and protects you. Until the start of your next turn, you have a +5 bonus to AC, including against the triggering attack, and you take no damage from magic missile."}, {"name": "Shield of Faith", "level": 1, "concentration": true, "text": "1st-level abjuration. Casting Time: 1 bonus action. Range: 60 ft. Components: V, S, M (a small parchment with a bit of holy text). Duration: Concentration, up to 10 minutes.\n\nA shimmering field appears and surrounds a creature of your choice within range, granting it a +2 bonus to AC for the duration."}, {"name": "Sleep", "level": 1, "text": "1st-level enchantment. Casting Time: 1 action. Range: 90 ft. Components: V, S, M (a pinch of fine sand, rose petals, or a cricket). Duration: 1 minute.\n\nRoll 5d8; the total is how many hit points of creatures this spell can affect. Creatures within 20 ft of a point you choose are affected in ascending order of their current hit points (ignoring unconscious creatures). Each creature is subtracted from the total, and each whose hit points fall within it falls unconscious until the spell ends, the sleeper takes damage, or someone uses an action to shake it awake. Undead and creatures immune to being charmed are unaffected. Roll an extra 2d8 per slot level above 1st.", "dice": "5d8"}, {"name": "Thunderwave", "level": 1, "save": "CON 14", "damage": "2d8", "text": "1st-level evocation. Casting Time: 1 action. Range: Self (15-ft cube). Components: V, S. Duration: Instantaneous.\n\nA wave of thunderous force sweeps out from you. Each creature in a 15-ft cube originating from you must make a Constitution saving throw. On a failed save, a creature takes 2d8 thunder damage and is pushed 10 ft away from you. On a success, it takes half damage and isn't pushed. Unsecured objects are also pushed and the spell emits a thunderous boom audible out to 300 ft. The damage increases by 1d8 per slot level above 1st."}, {"name": "Darkness", "level": 2, "concentration": true, "text": "2nd-level evocation. Casting Time: 1 action. Range: 60 ft. Components: V, M (bat fur and a drop of pitch or coal). Duration: Concentration, up to 10 minutes.\n\nMagical darkness spreads from a point you choose within range to fill a 15-ft-radius sphere for the duration. The darkness spreads around corners, and nonmagical light and darkvision can't illuminate it. If the point is on an object you hold or in your pocket, the darkness moves with it. Casting a spell of 2nd level or higher on the area dispels the darkness if it is a light spell of equal or higher level."}, {"name": "Nazar the Evil Eye", "level": 2, "save": "varies 14", "text": "2nd-level enchantment. Casting Time: 1 action. Range: 30 ft. Components: S. Duration: Varies.\n\nYour eyes momentarily morph to the colors of the Evil Eye and you curse a creature of your choice within 30 ft. Choose one effect; the target makes the listed saving throw (DC 14) or suffers it:\n• STR save or gain one level of exhaustion (no effect if it already has one).\n• DEX save or disadvantage on any one task needing fine manipulation.\n• CON save or lose the use of Hit Dice on its next short rest.\n• INT save or lose the ability to read for one hour.\n• WIS save or disadvantage on its next spell save.\n• CHA save or disadvantage on its next Persuasion, Intimidation, Deception, or Performance check. (Historica Arcanum: City of Crescent.)", "choices": [{"label": "STR — gain 1 level of exhaustion", "save": "STR 14"}, {"label": "DEX — disadvantage on a fine-manipulation task", "save": "DEX 14"}, {"label": "CON — lose Hit Dice on next short rest", "save": "CON 14"}, {"label": "INT — cannot read for 1 hour", "save": "INT 14"}, {"label": "WIS — disadvantage on next spell save", "save": "WIS 14"}, {"label": "CHA — disadvantage on next social check", "save": "CHA 14"}]}, {"name": "Pass without Trace", "level": 2, "concentration": true, "text": "2nd-level abjuration. Casting Time: 1 action. Range: Self. Components: V, S, M (ashes from burned mistletoe and a sprig of spruce). Duration: Concentration, up to 1 hour.\n\nA veil of shadows and silence radiates from you, masking you and your companions from detection. For the duration, each creature you choose within 30 ft of you (including you) has a +10 bonus to Dexterity (Stealth) checks and can't be tracked except by magical means. A creature leaves behind no tracks or other traces of its passage."}, {"name": "Beacon of Hope", "level": 3, "concentration": true, "text": "3rd-level abjuration. Casting Time: 1 action. Range: 30 ft. Components: V, S. Duration: Concentration, up to 1 minute.\n\nYou bestow hope and vitality on any number of creatures of your choice within range. For the duration, each target has advantage on Wisdom saving throws and death saving throws, and regains the maximum number of hit points possible from any healing."}, {"name": "Counterspell", "level": 3, "text": "3rd-level abjuration. Casting Time: 1 reaction, which you take when you see a creature within 60 ft casting a spell. Range: 60 ft. Components: S. Duration: Instantaneous.\n\nYou attempt to interrupt a creature in the process of casting a spell. If the creature is casting a spell of 3rd level or lower, its spell fails and has no effect. If it is casting a spell of 4th level or higher, make an ability check using your spellcasting ability (DC = 10 + the spell's level); on a success, the spell fails. If you cast this spell with a higher-level slot, an interrupted spell of that level or lower automatically fails."}, {"name": "Command", "level": 1, "text": "1st-level enchantment. Casting Time: 1 action. Range: 60 feet. Components: V. Duration: 1 round.\n\nYou speak a one-word command to a creature you can see within range. The target must succeed on a Wisdom saving throw or follow the command on its next turn. The spell has no effect if the target is undead, if it doesn’t understand your language, or if your command is directly harmful to it. Some typical commands and their effects follow. You might issue a command other than one described here. If you do so, the GM determines how\n\nthe target behaves. If the target can’t follow your command, the spell ends. Approach. The target moves toward you by the shortest and most direct route, ending its turn if it moves within 5 feet of you. Drop. The target drops whatever it is holding and then ends its turn. Flee. The target spends its turn moving away from you by the fastest available means. Grovel. The target falls prone and then ends its turn. Halt. The target doesn’t move and takes no actions. A flying creature stays aloft, provided that it is able to do so. If it must move to stay aloft, it flies the minimum distance needed to remain in the air.", "notes": "Djinnmaster expanded (always prepared)"}, {"name": "Bane", "level": 1, "text": "1st-level enchantment. Casting Time: 1 action. Range: 30 feet. Components: V, S, M (a drop of blood). Duration: Concentration, up to 1 minute.\n\nUp to three creatures of your choice that you can see within range must make Charisma saving throws. Whenever a target that fails this saving throw makes an attack roll or a saving throw before the spell ends, the target must roll a d4 and subtract the number rolled from the attack roll or saving throw.", "notes": "Djinnmaster expanded (always prepared)"}, {"name": "Enhance Ability", "level": 2, "text": "2nd-level transmutation. Casting Time: 1 action. Range: Touch. Components: V, S, M (fur or a feather from a beast). Duration: Concentration, up to 1 hour..\n\nYou touch a creature and bestow upon it a magical enhancement. Choose one of the following effects; the target gains that effect until the spell ends. Bear’s Endurance. The target has advantage on Constitution checks. It also gains 2d6 temporary hit points, which are lost when the spell ends. Bull’s Strength. The target has advantage on Strength checks, and his or her carrying capacity doubles. Cat’s Grace. The target has advantage on Dexterity checks. It also doesn’t take damage from falling 20 feet or less if it isn’t incapacitated. Eagle’s Splendor. The target has advantage on Charisma checks. Fox’s Cunning. The target has advantage on Intelligence checks. Owl’s Wisdom. The target has advantage on Wisdom checks.", "notes": "Djinnmaster expanded (always prepared)"}, {"name": "Augury", "level": 2, "text": "2nd-level divination. Casting Time: 1 minute. Range: Self. Components: V, S, M (specially marked sticks, bones, or similar tokens worth at least 25 gp). Duration: Instantaneous.\n\nBy casting gem-inlaid sticks, rolling dragon bones, laying out ornate cards, or employing some other divining tool, you receive an omen from an otherworldly entity about the results of a specific course of action that you plan to take within the next 30 minutes. The GM chooses from the following possible omens: •Weal, for good results •Woe, for bad results •Weal and woe, for both good and bad results •Nothing, for results that aren't especially good or bad The spell doesn't take into account any possible circumstances that might change the outcome, such as the casting of additional spells or the loss or gain of a companion. If you cast the spell two or more times before completing your next long rest, there is a cumulative 25 percent chance for each casting after the first that you get a random reading. The GM makes this roll in secret.", "notes": "Djinnmaster expanded (always prepared)"}, {"name": "Speak with Dead", "level": 3, "text": "3rd-level necromancy. Casting Time: 1 action. Range: 10 feet. Components: V, S, M (burning incense). Duration: 10 minutes.\n\nYou grant the semblance of life and intelligence to a corpse of your choice within range, allowing it to answer the questions you pose. The corpse must still have a mouth and can’t be undead. The spell fails if the corpse was the target of this spell within the last 10 days. Until the spell ends, you can ask the corpse up to five questions. The corpse knows only what it knew in life, including the languages it knew. Answers are usually brief, cryptic, or repetitive, and the corpse is under no compulsion to offer a truthful answer if you are hostile to it or it recognizes you as an enemy. This spell doesn’t return the creature’s soul to its body, only its animating spirit. Thus, the corpse can’t learn new information, doesn’t comprehend anything that has happened since it died, and can’t speculate about future events.", "notes": "Djinnmaster expanded (always prepared)"}, {"name": "Bestow Curse", "level": 3, "text": "3rd-level necromancy. Casting Time: 1 action. Range: Touch. Components: V, S. Duration: Concentration, up to 1 minute.\n\nYou touch a creature, and that creature must succeed on a Wisdom saving throw or become cursed for the duration of the spell. When you cast this spell, choose the nature of the curse from the following options:\n\n• Choose one ability score. While cursed, the target has disadvantage on ability checks and saving throws made with that ability score. • While cursed, the target has disadvantage on attack rolls against you. • While cursed, the target must make a Wisdom saving throw at the start of each of its turns. If it fails, it wastes its action that turn doing nothing. • While the target is cursed, your attacks and spells deal an extra 1d8 necrotic damage to the target. A remove curse spell ends this effect. At the GM’s option, you may choose an alternative curse effect, but it should be no more powerful than those described above. The GM has final say on such a curse’s effect.", "notes": "Djinnmaster expanded (always prepared)"}, {"name": "Banishment", "level": 4, "text": "4th-level abjuration. Casting Time: 1 action. Range: 60 feet. Components: V, S, M (an item distasteful to the target). Duration: Concentration, up to 1 minute.\n\nYou attempt to send one creature that you can see within range to another plane of existence. The target must succeed on a Charisma saving throw or be banished.\n\nIf the target is native to the plane of existence you’re on, you banish the target to a harmless demiplane. While there, the target is incapacitated. The target remains there until the spell ends, at which point the target reappears in the space it left or in the nearest unoccupied space if that space is occupied. If the target is native to a different plane of existence than the one you’re on, the target is banished with a faint popping noise, returning to its home plane. If the spell ends before 1 minute has passed, the target reappears in the space it left or in the nearest unoccupied space if that space is occupied. Otherwise, the target doesn’t return.", "notes": "Djinnmaster expanded (always prepared)"}, {"name": "Polymorph", "level": 4, "text": "4th-level transmutation. Casting Time: 1 action. Range: 60 feet. Components: V, S, M (a caterpillar cocoon). Duration: Concentration, up to 1 hour.\n\nThis spell transforms a creature that you can see within range into a new form. An unwilling creature must make a Wisdom saving throw to avoid the effect. The spell has no effect on a shapechanger or a creature with 0 hit points. The transformation lasts for the duration, or until the target drops to 0 hit points or dies. The new form can be any beast whose challenge rating is equal to or less than the target’s (or the target’s level, if it doesn’t have a challenge rating). The target’s game statistics, including mental ability scores, are replaced by the statistics of the chosen beast. It retains its alignment and personality. The target assumes the hit points of its new form. When it reverts to its normal form, the creature returns to the number of hit points it had before it transformed. If it reverts as a result of dropping to 0 hit points, any excess damage carries over to its normal form. As long as the excess damage doesn’t reduce the creature’s normal form to 0 hit points, it isn’t knocked unconscious. The creature is limited in the actions it can perform by the nature of its new form, and it can’t speak, cast spells, or take any other action that requires hands or speech. The target’s gear melds into the new form. The creature can’t activate, use, wield, or otherwise benefit from any of its equipment.", "notes": "Djinnmaster expanded (always prepared)"}]}, "features": [{"name": "Otherworldly Patron: The Djinn", "source": "Class Features", "text": "It is told that they are made of smokeless fire, a primordial substance. Calling them elementals would be wrong; what we call smokeless fire has nothing to do with our version of flames. Their need for a vessel is also a myth, neither do they grant any wishes. But, it is true that they scour a parallel world, and they constantly interfere with ours. Never call them by their name, names have the power to summon - refer to them as “three lettered ones” instead. Contacting them is fruitless, and not because they won’t answer. They will. But you risk them having a laugh at the expense of your bodily integrity. Worse is if one takes a liking to you. They are envious creatures, and god almighty help those that they think are a competition for your attention. There are ways to keep them in line, yes. And of course those dark techniques can be taught. But have you considered what you will unleash if you happen to lose control? How will you keep the balance with your partners from the other realm, once you invite them to your body?"}, {"name": "Pact Magic", "source": "Class Features", "text": "Your arcane research and the magic bestowed on you by your patron have given you facility with spells.\n\nCantrips: You know two cantrips of your choice from the warlock spell list. You learn additional warlock cantrips of your choice at higher levels, as shown in the Cantrips Known column of the Warlock table.\n\nSpell Slots: The Warlock table shows how many spell slots you have. The table also shows what the level of those slots is; all of your spell slots are the same level. To cast one of your warlock spells of 1st level or higher, you must expend a spell slot. You regain all expended spell slots when you finish a short or long rest. For example, when you are 5th level, you have two 3rd-level spell slots. To cast the 1st-level spell thunderwave, you must spend one of those slots, and you cast it as a 3rd-level spell.\n\nSpells Known of 1st Level and Higher: At 1st level, you know two 1st-level spells of your choice from the warlock spell list. The Spells Known column of the Warlock table shows when you learn more warlock spells of your choice of 1st level and higher. A spell you choose must be of a level no higher than what's shown in the table's Slot Level column for your level. When you reach 6th level, for example, you learn a new warlock spell, which can be 1st, 2nd, or 3rd level. Additionally, when you gain a level in this class, you can choose one of the warlock spells you know and replace it with another spell from the warlock spell list, which also must be of a level for which you have spell slots.\n\nSpellcasting Ability: Charisma is your spellcasting ability for your warlock spells, so you use your Charisma whenever a spell refers to your spellcasting ability. In addition, you use your Charisma modifier when setting the saving throw DC for a warlock spell you cast and when making an attack roll with one.\nSpell save DC = 8 + your proficiency bonus + your Charisma modifier\nSpell attack modifier = your proficiency bonus + your Charisma modifier\n\nSpellcasting Focus: You can use an arcane focus as a spellcasting focus for your warlock spells."}, {"name": "Eldritch Invocations", "source": "Class Features", "text": "In your study of occult lore, you have unearthed eldritch invocations, fragments of forbidden knowledge that imbue you with an abiding magical ability. At 2nd level, you gain two eldritch invocations of your choice. Your invocation options are detailed at the end of the class description. When you gain certain warlock levels, you gain additional invocations of your choice, as shown in the Invocations Known column of the Warlock table. Additionally, when you gain a level in this class, you can choose one of the invocations you know and replace it with another invocation that you could learn at that level.\n\nIf an eldritch invocation has prerequisites, you must meet them to learn it. You can learn the invocation at the same time that you meet its prerequisites. A level prerequisite refers to your level in this class.\n\nAgonizing Blast (Prerequisite: eldritch blast cantrip): When you cast eldritch blast, add your Charisma modifier to the damage it deals on a hit.\n\nArmor of Shadows: You can cast mage armor on yourself at will, without expending a spell slot or material components.\n\nAscendant Step (Prerequisite: 9th level): You can cast levitate on yourself at will, without expending a spell slot or material components.\n\nBeast Speech: You can cast speak with animals at will, without expending a spell slot.\n\nBeguiling Influence: You gain proficiency in the Deception and Persuasion skills.\n\nBewitching Whispers (Prerequisite: 7th level): You can cast compulsion once using a warlock spell slot. You can't do so again until you finish a long rest.\n\nBook of Ancient Secrets (Prerequisite: Pact of the Tome feature): You can now inscribe magical rituals in your Book of Shadows. Choose two 1st-level spells that have the ritual tag from any class's spell list (the two needn't be from the same list). The spells appear in the book and don't count against the number of spells you know. With your Book of Shadows in hand, you can cast the chosen spells as rituals. You can't cast the spells except as rituals, unless you've learned them by some other means. You can also cast a warlock spell you know as a ritual if it has the ritual tag. On your adventures, you can add other ritual spells to your Book of Shadows. When you find such a spell, you can add it to the book if the spell's level is equal to or less than half your warlock level (rounded up) and if you can spare the time to transcribe the spell. For each level of the spell, the transcription process takes 2 hours and costs 50 gp for the rare inks needed to inscribe it.\n\nChains of Carceri (Prerequisite: 15th level, Pact of the Chain feature): You can cast hold monster at will—targeting a celestial, fiend, or elemental—without expending a spell slot or material components. You must finish a long rest before you can use this invocation on the same creature again.\n\nDevil's Sight: You can see normally in darkness, both magical and nonmagical, to a distance of 120 feet.\n\nDreadful Word (Prerequisite: 7th level): You can cast confusion once using a warlock spell slot. You can't do so again until you finish a long rest.\n\nEldritch Sight: You can cast detect magic at will, without expending a spell slot.\n\nEldritch Spear (Prerequisite: eldritch blast cantrip): When you cast eldritch blast, its range is 300 feet.\n\nEyes of the Rune Keeper: You can read all writing.\n\nFiendish Vigor: You can cast false life on yourself at will as a 1st-level spell, without expending a spell slot or material components.\n\nGaze of Two Minds: You can use your action to touch a willing humanoid and perceive through its senses until the end of your next turn. As long as the creature is on the same plane of existence as you, you can use your action on subsequent turns to maintain this connection, extending the duration until the end of your next turn. While perceiving through the other creature's senses, you benefit from any special senses possessed by that creature, and you are blinded and deafened to your own surroundings.\n\nLifedrinker (Prerequisite: 12th level, Pact of the Blade feature): When you hit a creature with your pact weapon, the creature takes extra necrotic damage equal to your Charisma modifier (minimum 1).\n\nMask of Many Faces: You can cast disguise self at will, without expending a spell slot.\n\nMaster of Myriad Forms (Prerequisite: 15th level): You can cast alter self at will, without expending a spell slot.\n\nMinions of Chaos (Prerequisite: 9th level): You can cast conjure elemental once using a warlock spell slot. You can't do so again until you finish a long rest.\n\nMire the Mind (Prerequisite: 5th level): You can cast slow once using a warlock spell slot. You can't do so again until you finish a long rest.\n\nMisty Visions: You can cast silent image at will, without expending a spell slot or material components.\n\nOne with Shadows (Prerequisite: 5th level): When you are in an area of dim light or darkness, you can use your action to become invisible until you move or take an action or a reaction.\n\nOtherworldly Leap (Prerequisite: 9th level): You can cast jump on yourself at will, without expending a spell slot or material components.\n\nRepelling Blast (Prerequisite: eldritch blast cantrip): When you hit a creature with eldritch blast, you can push the creature up to 10 feet away from you in a straight line.\n\nSculptor of Flesh (Prerequisite: 7th level): You can cast polymorph once using a warlock spell slot. You can't do so again until you finish a long rest.\n\nSign of Ill Omen (Prerequisite: 5th level): You can cast bestow curse once using a warlock spell slot. You can't do so again until you finish a long rest.\n\nThief of Five Fates: You can cast bane once using a warlock spell slot. You can't do so again until you finish a long rest.\n\nThirsting Blade (Prerequisite: 5th level, Pact of the Blade feature): You can attack with your pact weapon twice, instead of once, whenever you take the Attack action on your turn.\n\nVisions of Distant Realms (Prerequisite: 15th level): You can cast arcane eye at will, without expending a spell slot.\n\nVoice of the Chain Master (Prerequisite: Pact of the Chain feature): You can communicate telepathically with your familiar and perceive through your familiar's senses as long as you are on the same plane of existence. Additionally, while perceiving through your familiar's senses, you can also speak through your familiar in your own voice, even if your familiar is normally incapable of speech.\n\nWhispers of the Grave (Prerequisite: 9th level): You can cast speak with dead at will, without expending a spell slot.\n\nWitch Sight (Prerequisite: 15th level): You can see the true form of any shapechanger or creature concealed by illusion or transmutation magic while the creature is within 30 feet of you and within line of sight."}, {"name": "Djinnmaster Expanded Spell List", "source": "Class Features (Djinnmaster)", "text": "You gain the following expanded spells.\n\nExpanded (always prepared):\n  1: command, bane\n  2: enhance ability, augury\n  3: speak with the dead, bestow curse\n  4: banishment, polymorph\n  5: dominate person, hold monster"}, {"name": "Voices of Al-Ghaib", "source": "Class Features (Djinnmaster)", "uses": {"max": 1, "per": "Short Rest"}, "text": "Starting at 1st-level, you gain proficiency with Arcana. If you are already proficient in it, you gain another skill from Intelligence. When rolling to gain knowledge on the realm of Al-Ghaib, you can ask your djinni to give you a +10 bonus to that check, as long as you use this feature before the roll. You can’t use this feature again until you finish a short or a long rest."}, {"name": "Controlled Possession", "source": "Class Features (Djinnmaster)", "uses": {"max": 1, "per": "Long Rest"}, "text": "You learned how to command the Djinn’s power for a brief amount of time, but this comes at a great cost. Starting at first level, as a bonus action, you can pull your consciousness back for your Djinn to take over your body for a brief time, enhancing your combat abilities. You add 1d6 force damage to all your melee and ranged damage rolls (including ranged spell attack rolls) as long as the Djinn is in control. This damage is increased to 2d6 force damage at level 5, 2d8 force damage at level 11 and 3d8 force damage at level 14. For each time you use this ability in one combat (doesn’t matter if you hit or miss) pick a d6 and roll them all at the end of combat; apply the amount as psychic damage to yourself. This feature lasts for 1 minute. You can use this ability once per long rest."}, {"name": "Losing Control (Optional Feature)", "source": "Class Features (Djinnmaster)", "text": "Starting at 1st level, your patron may try to possess your body. With every level you gain in this class, you make a Charisma saving throw. The difficulty is set by the GM (more powerful djinn means higher difficulty). On the third successive fail, the djinn possesses your body, and you become a Sorcerer of Djinnpossessed origin. You retain your level, experience, and abilities but everything about your class changes."}, {"name": "Pact Boon: Pact of the Eye", "source": "Class Features (Djinnmaster)", "uses": {"max": 3, "per": "Short Rest"}, "text": "Pact of the Eye: Your eyes will be imbued with otherworldly magic. If you wish your eye color may change according to your patron (your or GM’s choice). You can borrow an otherworldly sight when you need it. You gain increased eyesight and the ability Blindsight (10 ft.) and have +2 bonus to your Passive Perception.\n\nOnce you activate the magic in your eye (as a bonus action) you can choose one of the benefits:\n\n• You have Darkvision out to a range of 120 ft. for 10 minutes. If you already have Darkvision from other sources, this feature adds Darkvision on top of the other.\n\n• Your eyes can detect curses, nazars, diseases and desecrated, or sacred places within 60 ft. for 10 minutes.\n\n• You can see Shapechangers and Invisible creatures for 1 minute.\n\n• For the Historica Arcanum Universe: You can detect any influence from Al-Ghaib or creatures from Al-Ghaib for 1 minute. (For other settings you can change Al-Ghaib to Ethereal or Astral Plane)\n\nYou can use this feature equal to your proficiency bonus. Your uses will replenish after you finish a short or long rest."}, {"name": "Unfathomable Being", "source": "Class Features (Djinnmaster)", "uses": {"max": 3, "per": "Long Rest"}, "text": "The Djinn possessing your body doesn’t like to be spied upon or tracked by magic. Starting at 6th level, whenever you are being targeted by an enchantment or a divination spell, the spellcaster (if within 120 ft.) has to roll a Wisdom saving throw (Difficulty is your spell save DC) On a failed save, the effects of the spell are negated and the user takes 1d6 psychic damage for each spell level. You may use this ability a number of times equal to your proficiency modifier, and the expended uses come back at a long rest.\n\nAlso, as an action you can unleash a fraction of the djinn’s true form. Every creature that can see the djinn makes a Wisdom saving throw against your spell save DC. On a failed save, they are frightened of you for 1 minute and can repeat the saving throw at the end of their turns. You can’t use this feature again until you finish a short or long rest."}, {"name": "Djinnmaster Invocations", "source": "Class Features (Djinnmaster)", "text": "Dead Spirits Around: You can sense any undead within 300 ft. You don’t know the type and location, but you are aware of the numbers.\n\nTouch of the Eye: You can cast nazar once a day, without expending a spell slot.\n\nWay of the Sage: You gain proficiency in Arcana and History.\n\nVoices of Al-Ghaib: You can use your bonus action to sense fiends, feys and djinns around 30 ft. of you that are not behind the total cover. You know which type (e.g. a fiend) but not specifics (e.g. a succubus) about the target. You know how many of them there are. You can use this ability equal to your proficiency bonus and your replenished uses will recover after you finish a short or long rest.\n\nSense the Vile: (Prerequisite: 9th-level) You can cast sense the sinner once a day, without expending a spell slot.\n\nMaddening Blast: (Prerequisite: Eldritch Blast - 5th level) Once a turn, you enhance your Eldritch Blast with the influence of Al-Ghaib. When you hit a creature with Eldritch Blast, you can make them hear maddening voices from Al-Ghaib (no actions required). That creature will have disadvantage on the next attack roll. You can use this feature a number of times equal to your proficiency bonus.\n\n[Select her known Eldritch Invocations — a Warlock 7 knows 4 — from this list and/or the standard Warlock invocations.]"}, {"name": "Darkvision", "source": "Racial Traits", "text": "60 ft."}, {"name": "Fiendish Legacy (Infernal)", "source": "Racial Traits", "text": "Resistance to Fire; Fire Bolt at 1, Hellish Rebuke at 3, Darkness at 5, cast with CHA."}, {"name": "Otherworldly Presence", "source": "Racial Traits", "text": "Thaumaturgy cantrip, cast with the Fiendish Legacy ability."}, {"name": "Magic Initiate (Cleric)", "source": "Feats", "text": "Two Cleric cantrips and one 1st-level Cleric spell always prepared; the 1st-level spell castable once per Long Rest without a slot, or with slots."}, {"name": "Accomplished Chemist: Lightrod", "source": "Feats", "text": "An alchemically enchanted rod; as an action, illuminates like the Light cantrip. (Profession track: further chemist recipes unearned.)"}], "proficiencies": {"armor": "", "weapons": "Daggers, darts, slings, quarterstaffs, light crossbows", "tools": "Calligrapher's Supplies; Alchemist's Supplies", "languages": "Common Sign Language, Djinnspeak, Turkish, Arabic"}, "inventory": [], "currency": {"cp": 0, "sp": 0, "ep": 0, "gp": 0, "pp": 0}, "notes": "Reclassed Sorcerer -> Djinnmaster Warlock (Night-18 pivot: Faravi torn loose by the Crown of Sargon, then a pact struck). Both books describe this exorcism-and-pact switch. Kept: ability scores, Tiefling (Infernal) traits, Magic Initiate (Cleric), Accomplished Chemist, her existing spells, and CON/CHA saves (character-creation proficiencies, per owner). Dropped the Sorcerer class features (Innate Sorcery, Font of Magic, Metamagic, Djinntouched, The Djinn Inside). Added the Warlock chassis (Pact Magic: 2 slots at 4th level, short-rest recharge; Eldritch Invocations; Pact of the Eye) and the Djinnmaster subclass features verbatim from the DSL, plus the 8 expanded spells (command/bane, enhance ability/augury, speak with dead/bestow curse, banishment/polymorph). Spell DC 14 / atk +6 (CHA). OPEN: pick her 4 known Eldritch Invocations (see the Djinnmaster Invocations feature). FLAGS: HP unchanged at 39; her 7 current Hit Dice stay d6 (Sorcerer levels) and future level-ups use the Warlock d8. Her kept spell list exceeds the standard Warlock known count (retained per her existing build + feats)."};</script>
