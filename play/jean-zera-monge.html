<script>window.SHEET = {"id": "jean-zera-monge", "name": "Jean-Zera Mongé", "player": "", "portrait": "../cabal/img/jean-zera-monge.webp", "level": 7, "classes": [{"name": "Bard", "subclass": "College of Eloquence", "level": 7}], "race": "Half-Elf", "abilities": {"str": 8, "dex": 14, "con": 13, "int": 16, "wis": 14, "cha": 18}, "saveProf": ["dex", "cha"], "proficiencyBonus": 3, "skills": {"arcana": 1, "history": 1, "insight": 1, "investigation": 2, "perception": 1, "performance": 1, "persuasion": 2}, "ac": 14, "speed": 30, "hp": {"max": 53, "current": 53, "temp": 0}, "hitDice": [{"size": "d8", "total": 7}], "attacks": [{"name": "Dagger", "ability": "dex", "damage": "1d4 MOD", "damageType": "piercing", "range": "20/60 ft", "notes": "Finesse, light, thrown."}, {"name": "Handgun", "ability": "dex", "damage": "1d6 MOD", "damageType": "piercing", "range": "200/500 ft", "notes": "Martial Ranged. Ammunition, Light, Finesse, Gunpowder, Reload. Gunpowder: All martial firearm weapons have the gunpowder property; when you roll the maximum amount of damage in damage die, you reroll the die and add it to the resulting damage. Reload: this determines how much ammunition can be spent without using an attack or an action to reload the weapon. (Firearm proficiency assumed — not in his listed weapon profs; confirm.)"}, {"name": "Unarmed Strike", "ability": "str", "damage": "1 MOD", "damageType": "bludgeoning", "range": "melee", "notes": ""}], "spellcasting": {"ability": "cha", "saveDC": 15, "attackBonus": 7, "slots": {"1": {"total": 4}, "2": {"total": 3}, "3": {"total": 3}, "4": {"total": 1}}, "spells": [{"name": "Mage Hand", "level": 0, "text": "Conjuration cantrip. Casting Time: 1 action. Range: 30 feet. Components: V, S. Duration: 1 minute.\n\nA spectral, floating hand appears at a point you choose within range. The hand lasts for the duration or until you dismiss it as an action. The hand vanishes if it is ever more than 30 feet away from you or if you cast this spell again.\n\nYou can use your action to control the hand. You can use the hand to manipulate an object, open an unlocked door or container, stow or retrieve an item from an open container, or pour the contents out of a vial. You can move the hand up to 30 feet each time you use it. The hand can’t attack, activate magic items, or carry more than 10 pounds."}, {"name": "Vicious Mockery", "level": 0, "text": "Enchantment cantrip. Casting Time: 1 action. Range: 60 feet. Components: V. Duration: Instantaneous.\n\nYou unleash a string of insults laced with subtle enchantments at a creature you can see within range. If the target can hear you (though it need not understand you), it must succeed on a Wisdom saving throw or take 1d4 psychic damage and have disadvantage on the next attack roll it makes before the end of its next turn. This spell's damage increases by 1d4 when you reach 5th level (2d4), 11th level (3d4), and 17th level (4d4).", "save": "WIS 15", "damage": "2d4"}, {"name": "Prestidigitation", "level": 0, "text": "Transmutation cantrip. Casting Time: 1 action. Range: 10 feet. Components: V, S. Duration: Up to 1 hour.\n\nThis spell is a minor magical trick that novice spellcasters use for practice. You create one of the following magical effects within range:\n\n• You create an instantaneous, harmless sensory effect, such as a shower of sparks, a puff of wind, faint musical notes, or an odd odor. • You instantaneously light or snuff out a candle, a torch, or a small campfire. • You instantaneously clean or soil an object no larger than 1 cubic foot. • You chill, warm, or flavor up to 1 cubic foot of nonliving material for 1 hour. • You make a color, a small mark, or a symbol appear on an object or a surface for 1 hour. • You create a nonmagical trinket or an illusory image that can fit in your hand and that lasts until the end of your next turn. If you cast this spell multiple times, you can have up to three of its non-instantaneous effects active at a time, and you can dismiss such an effect as an action."}, {"name": "Mind Sliver", "level": 0, "text": "Enchantment cantrip. Casting Time: 1 action. Range: 60 feet. Components: V. Duration: 1 round.\n\nYou drive a disorienting spike of psychic energy into the mind of one creature you can see within range. The target must succeed on an Intelligence saving throw or take 1d6 psychic damage and subtract 1d4 from the next saving throw it makes before the end of your next turn.\n\nAt Higher Levels. This spell's damage increases by 1d6 when you reach certain levels: 5th level (2d6), 11th level (3d6), and 17th level (4d6).", "save": "INT 15", "damage": "2d6"}, {"name": "Chill Touch", "level": 0, "text": "Necromancy cantrip. Casting Time: 1 action. Range: 120 feet. Components: V, S. Duration: 1 round.\n\nYou create a ghostly, skeletal hand in the space of a creature within range. Make a ranged spell attack against the creature to assail it with the chill of the grave. On a hit, the target takes 1d8 necrotic damage, and it can’t regain hit points until the start of your next turn. Until then, the hand clings to the target. If you hit an undead target, it also has disadvantage on attack rolls against you until the end of your next turn. This spell’s damage increases by 1d8 when you reach 5th level (2d8), 11th level (3d8), and 17th level (4d8).", "attack": true, "damage": "2d8"}, {"name": "Detect Magic", "level": 1, "text": "1st-level divination. Casting Time: 1 action. Range: Self. Components: V, S. Duration: Concentration, up to 10 minutes.\n\nFor the duration, you sense the presence of magic within 30 feet of you. If you sense magic in this way, you can use your action to see a faint aura around any visible creature or object in the area that bears magic, and you learn its school of magic, if any. The spell can penetrate most barriers, but it is blocked by 1 foot of stone, 1 inch of common metal, a thin sheet of lead, or 3 feet of wood or dirt.", "concentration": true, "ritual": true}, {"name": "Command", "level": 1, "text": "1st-level enchantment. Casting Time: 1 action. Range: 60 feet. Components: V. Duration: 1 round.\n\nYou speak a one-word command to a creature you can see within range. The target must succeed on a Wisdom saving throw or follow the command on its next turn. The spell has no effect if the target is undead, if it doesn’t understand your language, or if your command is directly harmful to it. Some typical commands and their effects follow. You might issue a command other than one described here. If you do so, the GM determines how\n\nthe target behaves. If the target can’t follow your command, the spell ends. Approach. The target moves toward you by the shortest and most direct route, ending its turn if it moves within 5 feet of you. Drop. The target drops whatever it is holding and then ends its turn. Flee. The target spends its turn moving away from you by the fastest available means. Grovel. The target falls prone and then ends its turn. Halt. The target doesn’t move and takes no actions. A flying creature stays aloft, provided that it is able to do so. If it must move to stay aloft, it flies the minimum distance needed to remain in the air.", "save": "WIS 15"}, {"name": "Healing Word", "level": 1, "text": "1st-level evocation. Casting Time: 1 bonus action. Range: 60 feet. Components: V. Duration: Instantaneous.\n\nA creature of your choice that you can see within range regains hit points equal to 1d4 + your spellcasting ability modifier. This spell has no effect on undead or constructs.", "heal": "1d4 MOD", "action": "bonus"}, {"name": "Illusory Script", "level": 1, "text": "1st-level illusion. Casting Time: 1 minute. Range: Touch. Components: S, M (a lead-based ink worth at least 10 gp, which the spell consumes). Duration: 10 days.\n\nYou write on parchment, paper, or some other suitable writing material and imbue it with a potent illusion that lasts for the duration. To you and any creatures you designate when you cast the spell, the writing appears normal, written in your hand, and conveys whatever meaning you intended when you wrote the text. To all others, the writing appears as if it were written in an unknown or magical script that is unintelligible. Alternatively, you can cause the writing to appear to be an entirely different message, written in a different hand and language, though the language must be one you know. Should the spell be dispelled, the original script and the illusion both disappear. A creature with truesight can read the hidden message.", "ritual": true}, {"name": "The Lion's Key", "level": 1, "text": "1st-level transmutation. Casting Time: 1 action. Range: 10 ft. Components: V, S. Duration: Instantaneous.\n\nA spell transcribed in ancient Greek upon a parchment found hidden in a scholar's study. Its office is to open any locked or sealed door within 10 ft of the caster; even a hand untrained in magic might wield it, provided the instructions are followed to the letter. The surviving copy carries flaws and errors of transcription that may yet mar or foil its working. (Campaign-custom scroll from 'A Gibbous Moon Over Constantinople' — text not found in the Historica Arcanum source; verify with the table.)"}, {"name": "Dissonant Whispers", "level": 1, "text": "1st-level enchantment. Casting Time: 1 action. Range: 60 ft. Components: V. Duration: Instantaneous.\n\nYou whisper a discordant melody that only one creature of your choice within range can hear, wracking it with terrible pain. The target must make a Wisdom saving throw. On a failed save, it takes 3d6 psychic damage and must immediately use its reaction, if available, to move as far as its speed allows away from you (it won't move into obviously dangerous ground). On a success, it takes half damage and doesn't have to move. A deafened creature automatically succeeds. The damage increases by 1d6 for each slot level above 1st.", "save": "WIS 15", "damage": "3d6"}, {"name": "Silvery Barbs", "level": 1, "text": "1st-level enchantment. Casting Time: 1 reaction, which you take when a creature you can see within 60 feet of yourself succeeds on an attack roll, an ability check, or a saving throw. Range: 60 feet. Components: V. Duration: Instantaneous.\n\nYou magically distract the triggering creature and turn its momentary uncertainty into encouragement for another creature. The triggering creature must reroll the d20 and use the lower roll.\n\nYou can then choose a different creature you can see within range (you can choose yourself). The chosen creature has advantage on the next attack roll, ability check, or saving throw it makes within 1 minute. A creature can be empowered by only one use of this spell at a time.", "action": "reaction"}, {"name": "Shield", "level": 1, "text": "1st-level abjuration. Casting Time: 1 reaction, which you take when you are hit by an attack or targeted by the magic missile spell. Range: Self. Components: V, S. Duration: 1 round.\n\nAn invisible barrier of magical force appears and protects you. Until the start of your next turn, you have a +5 bonus to AC, including against the triggering attack, and you take no damage from magic missile.", "action": "reaction"}, {"name": "Enhance Ability", "level": 2, "text": "2nd-level transmutation. Casting Time: 1 action. Range: Touch. Components: V, S, M (fur or a feather from a beast). Duration: Concentration, up to 1 hour..\n\nYou touch a creature and bestow upon it a magical enhancement. Choose one of the following effects; the target gains that effect until the spell ends. Bear’s Endurance. The target has advantage on Constitution checks. It also gains 2d6 temporary hit points, which are lost when the spell ends. Bull’s Strength. The target has advantage on Strength checks, and his or her carrying capacity doubles. Cat’s Grace. The target has advantage on Dexterity checks. It also doesn’t take damage from falling 20 feet or less if it isn’t incapacitated. Eagle’s Splendor. The target has advantage on Charisma checks. Fox’s Cunning. The target has advantage on Intelligence checks. Owl’s Wisdom. The target has advantage on Wisdom checks.", "concentration": true}, {"name": "Lesser Restoration", "level": 2, "text": "2nd-level abjuration. Casting Time: 1 action. Range: Touch. Components: V, S. Duration: Instantaneous.\n\nYou touch a creature and can end either one disease or one condition afflicting it. The condition can be blinded, deafened, paralyzed, or poisoned."}, {"name": "Dispel Magic", "level": 3, "text": "3rd-level abjuration. Casting Time: 1 action. Range: 120 feet. Components: V, S. Duration: Instantaneous.\n\nChoose one creature, object, or magical effect within range. Any spell of 3rd level or lower on the target ends. For each spell of 4th level or higher on the target, make an ability check using your spellcasting ability. The DC equals 10 + the spell’s level. On a successful check, the spell ends."}, {"name": "[Pending] Bestow Curse", "level": 3, "text": "3rd-level necromancy. Casting Time: 1 action. Range: Touch. Components: V, S. Duration: Concentration, up to 1 minute.\n\nYou touch a creature, and that creature must succeed on a Wisdom saving throw or become cursed for the duration of the spell. When you cast this spell, choose the nature of the curse from the following options:\n\n• Choose one ability score. While cursed, the target has disadvantage on ability checks and saving throws made with that ability score. • While cursed, the target has disadvantage on attack rolls against you. • While cursed, the target must make a Wisdom saving throw at the start of each of its turns. If it fails, it wastes its action that turn doing nothing. • While the target is cursed, your attacks and spells deal an extra 1d8 necrotic damage to the target. A remove curse spell ends this effect. At the GM’s option, you may choose an alternative curse effect, but it should be no more powerful than those described above. The GM has final say on such a curse’s effect.", "save": "WIS 15", "concentration": true}, {"name": "[Pending] Invisibility", "level": 2, "text": "2nd-level illusion. Casting Time: 1 action. Range: Touch. Components: V, S, M (an eyelash encased in gum arabic). Duration: Concentration, up to 1 hour.\n\nA creature you touch becomes invisible until the spell ends. Anything the target is wearing or carrying is invisible as long as it is on the target’s person. The spell ends for a target that attacks or casts a spell.", "concentration": true}]}, "features": [{"name": "Bardic Inspiration (d8)", "source": "Class Features", "uses": {"max": 4, "per": "Short Rest"}, "text": "You can inspire others through stirring words or music. To do so, you use a bonus action on your turn to choose one creature other than yourself within 60 feet of you who can hear you. That creature gains one Bardic Inspiration die, a d6. Once within the next 10 minutes, the creature can roll the die and add the number rolled to one ability check, attack roll, or saving throw it makes. The creature can wait until after it rolls the d20 before deciding to use the Bardic Inspiration die, but must decide before the GM says whether the roll succeeds or fails. Once the Bardic Inspiration die is rolled, it is lost. A creature can have only one Bardic Inspiration die at a time. You can use this feature a number of times equal to your Charisma modifier (a minimum of once). You regain any expended uses when you finish a long rest. Your Bardic Inspiration die changes when you reach certain levels in this class. The die becomes a d8 at 5th level, a d10 at 10th level, and a d12 at 15th level."}, {"name": "Jack of All Trades", "source": "Class Features", "text": "Starting at 2nd level, you can add half your proficiency bonus, rounded down, to any ability check you make that doesn’t already include your proficiency bonus."}, {"name": "Song of Rest", "source": "Class Features", "text": "Beginning at 2nd level, you can use soothing music or oration to help revitalize your wounded allies during a short rest. If you or any friendly creatures who can hear your performance regain hit points at the end of the short rest by spending one or more Hit Dice, each of those creatures regains an extra 1d6 hit points. The extra hit points increase when you reach certain levels in this class: to 1d8 at 9th level, to 1d10 at 13th level, and to 1d12 at 17th level."}, {"name": "Expertise", "source": "Class Features", "text": "At 3rd level, choose two of your skill proficiencies. Your proficiency bonus is doubled for any ability check you make that uses either of the chosen proficiencies. At 10th level, you can choose another two skill proficiencies to gain this benefit.\n\n(Jean-Zera's expertise: Persuasion, Investigation.)"}, {"name": "Font of Inspiration", "source": "Class Features", "text": "Beginning when you reach 5th level, you regain all of your expended uses of Bardic Inspiration when you finish a short or long rest."}, {"name": "College of Eloquence", "source": "Class Features (College of Eloquence)", "text": "Adherents of the College of Eloquence master the art of oratory. Persuasion is regarded as a high art, and a well-reasoned, well-spoken argument often proves more powerful than objective truth. These bards wield a blend of logic and theatrical wordplay, winning over skeptics and detractors with logical arguments, and plucking at heartstrings to appeal to the emotions of entire audiences."}, {"name": "Silver Tongue", "source": "Class Features (College of Eloquence)", "text": "Starting at 3rd level, you are a master at saying the right thing at the right time. When you make a Charisma (Persuasion) or Charisma (Deception) check, you can treat a d20 roll of 9 or lower as a 10."}, {"name": "Unsettling Words", "source": "Class Features (College of Eloquence)", "text": "Also at 3rd level, you can spin words laced with magic that unsettle a creature and cause it to doubt itself. As a bonus action, you can expend one use of your Bardic Inspiration and choose one creature you can see within 60 feet of you. Roll the Bardic Inspiration die. The creature must subtract the number rolled from the next saving throw it makes before the start of your next turn."}, {"name": "Unfailing Inspiration", "source": "Class Features (College of Eloquence)", "text": "At 6th level, your inspiring words are so persuasive that others feel driven to succeed. When a creature adds one of your Bardic Inspiration dice to its ability check, attack roll, or saving throw and the roll fails, the creature can keep the Bardic Inspiration die."}, {"name": "Universal Speech", "source": "Class Features (College of Eloquence)", "uses": {"max": 1, "per": "Long Rest"}, "text": "Also at 6th level, you have gained the ability to make your speech intelligible to any creature. As an action, choose one or more creatures within 60 feet of you, up to a number equal to your Charisma modifier (minimum of one creature). The chosen creatures can magically understand you, regardless of the language you speak, for 1 hour.\n\nOnce you use this feature, you can't use it again until you finish a long rest, unless you expend a spell slot to use it again."}, {"name": "Darkvision", "source": "Racial Traits", "text": "60 ft."}, {"name": "Fey Ancestry", "source": "Racial Traits", "text": "Advantage on saves vs being charmed; immune to magical sleep."}, {"name": "Skill Versatility", "source": "Racial Traits", "text": "Proficiency in two additional skills."}, {"name": "Apprentice Archaeologist: Internal Compass", "source": "Profession", "category": "Profession", "text": "You never lose your way or direction due to your internal compass. You get advantage on Intelligence (Investigation) or Wisdom (Survival) checks to determine your way when looking for directions."}, {"name": "Archaeologist: Lore of the Past", "source": "Profession", "category": "Profession", "text": "All archeologists can get this preservation craft. You will gain advantage in any Intelligence (History) checks to remember any facts about the culture that the relic or the derelict you are working on at the moment."}], "proficiencies": {"armor": "Light armour", "weapons": "Simple weapons, hand crossbows, longswords, rapiers, shortswords", "tools": "Three musical instruments", "languages": "French, Russian, Turkish, Arabic, Aramaic, Latin"}, "inventory": [{"name": "Expedition kit", "qty": 1, "notes": "Book of notes, a bottle of ink, an ink pen; oiled canvas pack; worn leather jacket."}], "currency": {"cp": 0, "sp": 0, "ep": 0, "gp": 0, "pp": 0}, "notes": "Player-provided, leveled 4→7 (Half-Elf Bard, College of Eloquence). HP max 53. Spell list per owner; Bestow Curse vs Invisibility is an unmade choice — both listed as [Pending]. Mind Sliver, Silvery Barbs, and the College of Eloquence features are owner-supplied verbatim (owned sourcebooks); base Bard features + SRD spells from the SRD DSL; profession perks from the Historica DSL; Handgun from the Historica DSL. Note: 5 cantrips / 11 known + 1 pending is above standard Bard counts — extra cantrips/spells (Mind Sliver, Chill Touch, Shield, Silvery Barbs) presumably from feats; recorded as given."};</script>
