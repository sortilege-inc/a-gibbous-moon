<script>window.SHEET = {"id": "jean-zera-monge", "name": "Jean-Zera Mongé", "player": "", "portrait": "../cabal/img/jean-zera-monge.webp", "level": 4, "classes": [{"name": "Bard", "level": 4}], "race": "Half-Elf", "abilities": {"str": 8, "dex": 14, "con": 13, "int": 16, "wis": 14, "cha": 18}, "saveProf": ["dex", "cha"], "proficiencyBonus": 2, "skills": {"arcana": 1, "history": 1, "insight": 1, "investigation": 2, "perception": 1, "performance": 1, "persuasion": 2}, "ac": 14, "speed": 30, "hp": {"max": 27, "current": 27, "temp": 0}, "hitDice": [{"size": "d8", "total": 4}], "attacks": [{"name": "Dagger", "ability": "dex", "damage": "1d4 MOD", "damageType": "piercing", "range": "20/60 ft", "notes": "Finesse, light, thrown."}, {"name": "Pistol", "ability": "dex", "damage": "1d10 MOD", "damageType": "piercing", "range": "30/90 ft", "notes": "Firearm (gunpowder); loading/reload. Stats approximate — confirm the table's firearm rules."}, {"name": "Unarmed Strike", "ability": "str", "damage": "1 MOD", "damageType": "bludgeoning", "range": "melee", "notes": ""}], "spellcasting": {"ability": "cha", "slots": {"1": {"total": 4}, "2": {"total": 2}}, "spells": [{"name": "Mage Hand", "level": 0, "text": "Conjuration cantrip. Casting Time: 1 action. Range: 30 ft. Components: V, S. Duration: 1 minute.\n\nA spectral, floating hand appears at a point you choose within range. It lasts for the duration or until you dismiss it, and vanishes if it is more than 30 ft from you or you cast this spell again. You can use your action to control the hand: manipulate an object, open an unlocked door or container, stow or retrieve an item, or pour the contents of a vial. The hand can't attack, activate magic items, or carry more than 10 lb."}, {"name": "Prestidigitation", "level": 0, "text": "Transmutation cantrip. Casting Time: 1 action. Range: 10 ft. Components: V, S. Duration: Up to 1 hour.\n\nThis spell is a minor magical trick. You create an instantaneous harmless sensory effect (sparks, a puff of wind, faint musical notes, an odd odor); light or snuff a small flame; clean or soil a 1-cubic-ft object; chill, warm, or flavor up to 1 cubic ft of nonliving material for 1 hour; make a color, small mark, or symbol appear for 1 hour; or create a nonmagical trinket or illusory image that fits in your hand and lasts until the end of your next turn. You can have up to three of its non-instantaneous effects active at once."}, {"name": "Vicious Mockery", "level": 0, "save": "WIS 14", "damage": "1d4", "text": "Enchantment cantrip. Casting Time: 1 action. Range: 60 ft. Components: V. Duration: Instantaneous.\n\nYou unleash a string of insults laced with subtle enchantments at a creature you can see within range. If it can hear you (it needn't understand you), it must succeed on a Wisdom saving throw or take 1d4 psychic damage and have disadvantage on the next attack roll it makes before the end of its next turn. The damage increases with your level (1d4 at 1st, 2d4 at 5th, 3d4 at 11th, 4d4 at 17th)."}, {"name": "Detect Magic", "level": 1, "ritual": true, "concentration": true, "text": "1st-level divination (ritual). Casting Time: 1 action. Range: Self. Components: V, S. Duration: Concentration, up to 10 minutes.\n\nFor the duration, you sense the presence of magic within 30 ft of you. If you sense magic in this way, you can use your action to see a faint aura around any visible creature or object in the area that bears magic, and you learn its school of magic, if any. The spell is blocked by 1 ft of stone, 1 inch of common metal, a thin sheet of lead, or 3 ft of wood or dirt."}, {"name": "Dissonant Whispers", "level": 1, "save": "WIS 14", "damage": "3d6", "text": "1st-level enchantment. Casting Time: 1 action. Range: 60 ft. Components: V. Duration: Instantaneous.\n\nYou whisper a discordant melody that only one creature of your choice within range can hear, wracking it with terrible pain. The target must make a Wisdom saving throw. On a failed save, it takes 3d6 psychic damage and must immediately use its reaction, if available, to move as far as its speed allows away from you (it won't move into obviously dangerous ground). On a success, it takes half damage and doesn't have to move. A deafened creature automatically succeeds. The damage increases by 1d6 for each slot level above 1st."}, {"name": "Faerie Fire", "level": 1, "save": "DEX 14", "concentration": true, "text": "1st-level evocation. Casting Time: 1 action. Range: 60 ft. Components: V. Duration: Concentration, up to 1 minute.\n\nEach object in a 20-ft cube within range is outlined in blue, green, or violet light (your choice). Any creature in the area when the spell is cast is also outlined if it fails a Dexterity saving throw. For the duration, objects and affected creatures shed dim light in a 10-ft radius. Any attack roll against an affected creature or object has advantage if the attacker can see it, and the affected target can't benefit from being invisible."}, {"name": "Healing Word", "level": 1, "text": "1st-level evocation. Casting Time: 1 bonus action. Range: 60 ft. Components: V. Duration: Instantaneous.\n\nA creature of your choice that you can see within range regains hit points equal to 1d4 + your spellcasting ability modifier. This spell has no effect on undead or constructs. The healing increases by 1d4 for each slot level above 1st."}, {"name": "Illusory Script", "level": 1, "ritual": true, "text": "1st-level illusion (ritual). Casting Time: 1 minute. Range: Touch. Components: S, M (lead-based ink worth at least 10 gp, which the spell consumes). Duration: 10 days.\n\nYou write on parchment, paper, or another suitable material and imbue it with a potent illusion that lasts for the duration. To you and any creatures you designate when you cast the spell, the writing appears normal, written in your hand, and conveys whatever meaning you intended. To everyone else, the writing appears as an unintelligible or unrelated message of your choice, or as if written in an unknown or magical script. A creature with truesight can read the hidden message."}, {"name": "The Lion's Key", "level": 1, "text": "1st-level transmutation. Casting Time: 1 action. Range: 10 ft. Components: V, S. Duration: Instantaneous.\n\nA spell transcribed in ancient Greek upon a parchment found hidden in a scholar's study. Its office is to open any locked or sealed door within 10 ft of the caster; even a hand untrained in magic might wield it, provided the instructions are followed to the letter. The surviving copy carries flaws and errors of transcription that may yet mar or foil its working. (Campaign-custom scroll from 'A Gibbous Moon Over Constantinople' — text not found in the Historica Arcanum source; verify with the table.)"}, {"name": "Enhance Ability", "level": 2, "concentration": true, "text": "2nd-level transmutation. Casting Time: 1 action. Range: Touch. Components: V, S, M (fur or a feather from a beast). Duration: Concentration, up to 1 hour.\n\nYou touch a creature and bestow upon it a magical enhancement tied to one ability of your choice: Bear's Endurance (advantage on Constitution checks and 2d6 temporary hit points), Bull's Strength (advantage on Strength checks and double carrying capacity), Cat's Grace (advantage on Dexterity checks and no falling damage from up to 20 ft), Eagle's Splendor (advantage on Charisma checks), Fox's Cunning (advantage on Intelligence checks), or Owl's Wisdom (advantage on Wisdom checks). The effect lasts for the duration. You can target one additional creature per slot level above 2nd."}]}, "features": [{"name": "Bardic Inspiration (d6)", "source": "Class Features", "uses": {"max": 4, "per": "Long Rest"}, "text": "Bonus Action: give a creature within 60 ft a Bardic Inspiration die (d6). Within the next hour, on a failed D20 Test it may add the die. Uses = CHA modifier; regained on a Long Rest."}, {"name": "Expertise", "source": "Class Features", "text": "Double proficiency on Persuasion and Investigation."}, {"name": "Jack of All Trades", "source": "Class Features", "text": "Add half PB (round down) to any ability check using a skill you're not proficient in."}, {"name": "Song of Rest", "source": "Class Features", "text": "+1d6 HP to allies spending Hit Dice on a Short Rest."}, {"name": "College of Eloquence: Unsettling Words", "source": "Class Features", "text": "Bonus Action, expend a Bardic Inspiration die and target a creature within 60 ft; it subtracts the roll from its next save before your next turn."}, {"name": "College of Eloquence: Silver Tongue", "source": "Class Features", "text": "Treat a d20 roll of 9 or lower as a 10 on Persuasion and Deception checks."}, {"name": "Darkvision", "source": "Racial Traits", "text": "60 ft."}, {"name": "Fey Ancestry", "source": "Racial Traits", "text": "Advantage on saves vs being charmed; immune to magical sleep."}, {"name": "Skill Versatility", "source": "Racial Traits", "text": "Proficiency in two additional skills."}, {"name": "Apprentice Archaeologist: Internal Compass", "source": "Feats", "text": "Never lose your way; advantage on Investigation or Survival checks to find directions. (Profession track: Tools of the Trade / Eye for Value perks unearned.)"}], "proficiencies": {"armor": "Light armour", "weapons": "Simple weapons, hand crossbows, longswords, rapiers, shortswords", "tools": "Three musical instruments", "languages": "French, Russian, Turkish, Arabic, Aramaic, Latin"}, "inventory": [{"name": "Expedition kit", "qty": 1, "notes": "Book of notes, a bottle of ink, an ink pen; oiled canvas pack; worn leather jacket."}], "currency": {"cp": 0, "sp": 0, "ep": 0, "gp": 0, "pp": 0}, "notes": "Player-provided, current as of Act 3, level 4 Half-Elf Bard (College of Eloquence). NOTE: markedly behind the party's Night-18 level 7 — the least up-to-date of the four; the Pistol's stats are approximate pending the table's firearm rules."};</script>
