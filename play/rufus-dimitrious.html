<script>window.SHEET = {"id": "rufus-dimitrious", "name": "Rufus Dimitrious", "player": "", "portrait": "../cabal/img/rufus-dimitrious.webp", "level": 1, "classes": [{"name": "Rogue", "level": 1}], "race": "Human", "abilities": {"str": 11, "dex": 15, "con": 11, "int": 12, "wis": 12, "cha": 15}, "saveProf": ["dex", "int"], "proficiencyBonus": 2, "skills": {"athletics": 1, "deception": 2, "insight": 1, "perception": 1, "persuasion": 1, "stealth": 2}, "ac": 13, "speed": 30, "initiative": 2, "hp": {"max": 8, "current": 8, "temp": 0}, "hitDice": [{"size": "d8", "total": 1}], "attacks": [], "features": [{"name": "Expertise", "source": "Class Features", "text": "Chosen: Deception, Stealth At 1st level, choose two of your skill proficiencies, or one of your skill proficiencies and your proficiency with thieves' tools. Your proficiency bonus is doubled for any ability check you make that uses either of the chosen proficiencies. At 6th level, you can choose two more of your proficiencies (in skills or with thieves' tools) to gain this benefit."}, {"name": "Sneak Attack", "source": "Class Features", "text": "Beginning at 1st level, you know how to strike subtly and exploit a foe's distraction. Once per turn, you can deal an extra 1d6 damage to one creature you hit with an attack if you have advantage on the attack roll. The attack must use a finesse or a ranged weapon. You don't need advantage on the attack roll if another enemy of the target is within 5 feet of it, that enemy isn't incapacitated, and you don't have disadvantage on the attack roll. The amount of the extra damage increases as you gain levels in this class, as shown in the Sneak Attack column of the Rogue table."}, {"name": "Thieves' Cant", "source": "Class Features", "text": "During your rogue training you learned thieves' cant, a secret mix of dialect, jargon, and code that allows you to hide messages in seemingly normal conversation. Only another creature that knows thieves' cant understands such messages. It takes four times longer to convey such a message than it does to speak the same idea plainly. In addition, you understand a set of secret signs and symbols used to convey short, simple messages, such as whether an area is dangerous or the territory of a thieves' guild, whether loot is nearby, or whether the people in an area are easy marks or will provide a safe house for thieves on the run."}, {"name": "Ship's Passage", "source": "Feats", "text": "When you need to, you can secure free passage on a sailing ship for yourself and your adventuring companions. You might sail on the ship you served on, or another ship you have good relations with (perhaps one captained by a former crewmate). Because you're calling in a favor, you can't be certain of a schedule or route that will meet your every need. Your DM will determine how long it takes to get where you need to go. In return for your free passage, you and your companions are expected to assist the crew during the voyage."}], "proficiencies": {"armor": "Light Armor", "weapons": "Simple Weapons, Crossbow, Hand, Longsword, Rapier, Shortsword", "tools": "Thieves' Tools", "languages": "Greek, Turkish, Arabic, French"}, "inventory": [{"name": "Brooch of Wondrous Power - Silver Owl", "qty": 1, "notes": "Wondrous item, uncommon A small semicircular brooch, the pin of which is held in place by a perfectly formed owl cast in silver. Despite the millennium that this must have lay in t"}], "currency": {"cp": 0, "sp": 40, "ep": 0, "gp": 0, "pp": 0}, "notes": "Snapshot from Alchemy, 5 Nov 2025 (early-campaign, level 1) — a placeholder pending the Phase 3 refresh to the party's current state."};</script>
